<!DOCTYPE html>
<html lang="pt-BR" data-theme="cyberpunk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Quest Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- YAML parser -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <!-- Confetti effects -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Theme CSS (loaded dynamically) -->
  <link id="theme-stylesheet" rel="stylesheet" href="/themes/cyberpunk.css">

  <style>
    /* === BASE RESET (theme-agnostic) === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.5s ease;
    }

    /* === LAYOUT === */
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }

    /* --- Header --- */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1rem;
    }
    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header-project {
      font-size: 0.875rem;
      opacity: 0.6;
      margin-top: 0.25rem;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .theme-switcher {
      display: flex;
      gap: 0.5rem;
    }
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .zoom-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border-color, #334155);
      background: var(--bg-card, #1e293b);
      color: var(--text-primary, #e2e8f0);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .zoom-btn:hover { background: var(--bg-card-hover, #334155); }
    .zoom-label {
      font-family: var(--font-mono, monospace);
      font-size: 0.65rem;
      color: var(--text-secondary, #64748b);
      min-width: 32px;
      text-align: center;
    }
    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--accent-primary); }
    .theme-btn[data-theme="cyberpunk"] { background: linear-gradient(135deg, #0a0a1a, #1a0a2e); }
    .theme-btn[data-theme="minimal"] { background: linear-gradient(135deg, #0f172a, #1e293b); }
    .theme-btn[data-theme="fantasy"] { background: linear-gradient(135deg, #1a1208, #2a1f0e); }

    /* --- Stats Row --- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .stat-card {
      padding: 1.25rem;
      border-radius: var(--radius-card, 12px);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
    }
    .stat-value {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-accent);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }

    /* --- Level & XP Bar --- */
    .level-section {
      padding: 1.5rem;
      border-radius: var(--radius-card, 12px);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
    }
    .level-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: var(--radius-pill, 20px);
      background: var(--accent-primary);
      color: var(--bg-primary);
      font-weight: 700;
      font-size: 0.875rem;
    }
    .level-quote {
      font-style: italic;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .xp-bar-container {
      width: 100%;
      height: var(--xp-bar-height, 12px);
      background: var(--bg-secondary);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .xp-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--progress-gradient, linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)));
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .xp-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-family: var(--font-mono);
    }

    /* --- Worlds (Quest Log) --- */
    .worlds-section {
      display: grid;
      gap: 1rem;
    }
    .worlds-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .world-card {
      padding: 1.25rem;
      border-radius: var(--radius-card, 12px);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--border-color);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .world-card.world-complete {
      border-left-color: #22c55e;
      opacity: 0.85;
    }
    .world-card.world-active {
      border-left-color: var(--accent-primary);
    }
    .world-card.world-locked {
      opacity: 0.35;
      filter: grayscale(0.5);
      pointer-events: none;
    }
    .world-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .world-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary);
    }
    .world-status {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .world-tagline {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 0.75rem;
    }
    .world-progress {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 999px;
      overflow: hidden;
    }
    .world-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--progress-gradient);
      transition: width 0.8s ease;
    }

    /* --- Missions (expanded world) --- */
    .missions-list {
      margin-top: 1rem;
      display: grid;
      gap: 0.5rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease;
    }
    .world-card.expanded .missions-list {
      max-height: 2000px;
    }
    .mission {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.2rem 0.75rem;
      align-items: center;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      transition: background 0.2s ease;
    }
    .mission:hover { background: var(--bg-secondary); }
    .mission-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      grid-row: 1;
    }
    .mission-icon.done { background: #22c55e; color: white; }
    .mission-icon.pending { background: var(--bg-secondary); border: 2px solid var(--border-color); }
    .mission-icon.skipped { background: #64748b; color: white; }
    .mission-label { color: var(--text-primary); grid-row: 1; }
    .mission.done .mission-label { opacity: 0.6; text-decoration: line-through; }
    .mission.skipped .mission-label { opacity: 0.5; }
    .mission-xp {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent-primary);
      font-weight: 600;
      grid-row: 1;
    }
    .mission-note {
      grid-column: 2 / 4;
      grid-row: 2;
      font-size: 0.65rem;
      color: var(--text-secondary, #64748b);
      font-style: italic;
      line-height: 1.3;
      padding-top: 0.1rem;
    }

    /* --- Achievements --- */
    .achievements-section {
      padding: 1.5rem;
      border-radius: var(--radius-card, 12px);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
    }
    .achievements-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .achievement {
      padding: 0.75rem;
      border-radius: 8px;
      background: var(--bg-secondary);
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    .achievement.unlocked {
      border-color: var(--accent-primary);
    }
    .achievement.locked {
      opacity: 0.3;
      filter: grayscale(1);
    }
    .achievement-icon {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .achievement-name {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* --- Connection Status --- */
    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.5rem;
    }
    .connection-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .connection-dot.disconnected { background: #ef4444; }
    .connection-status {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
    }

    /* --- No Data State --- */
    .no-data {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    .no-data h2 {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .no-data code {
      background: var(--bg-secondary);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    /* --- Celebration Overlay --- */
    .celebration-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .celebration-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .celebration-card {
      padding: 2.5rem 3rem;
      border-radius: var(--radius-card);
      background: var(--bg-card);
      border: 2px solid var(--accent-primary);
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .celebration-overlay.active .celebration-card {
      transform: scale(1);
    }
    .celebration-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 0.5rem;
    }
    .celebration-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .celebration-xp {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin: 1rem 0;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .achievements-grid { grid-template-columns: repeat(3, 1fr); }
      .dashboard { padding: 1rem; }
    }
    @media (min-width: 2000px) {
      .dashboard { max-width: 1600px; }
      .stat-value { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="dashboard" id="app">
    <div class="no-data" id="no-data">
      <h2>Pipeline Quest Dashboard</h2>
      <p>Aguardando dados do checklist...</p>
      <p style="margin-top:1rem">Execute na outra aba do terminal:</p>
      <p style="margin-top:0.5rem"><code>/pipeline-checklist</code></p>
      <p style="margin-top:1rem;font-size:0.8rem;opacity:0.5">O dashboard atualiza automaticamente quando o checklist mudar.</p>
    </div>
  </div>

  <!-- Celebration Overlay -->
  <div class="celebration-overlay" id="celebration">
    <div class="celebration-card">
      <div class="celebration-title" id="celeb-title"></div>
      <div class="celebration-xp" id="celeb-xp"></div>
      <div class="celebration-desc" id="celeb-desc"></div>
    </div>
  </div>

  <!-- Connection Status -->
  <div class="connection-status">
    <span class="connection-dot disconnected" id="conn-dot"></span>
    <span id="conn-text">Conectando...</span>
  </div>

  <!-- Test Menu (click the dot to toggle) -->
  <div id="test-menu" style="
    position:fixed; bottom:2.5rem; right:1rem; display:none;
    background:var(--bg-card,#1e293b); border:1px solid var(--border-color,#334155);
    border-radius:8px; padding:0.4rem; font-size:0.6rem; z-index:999;
    font-family:var(--font-mono,monospace); color:var(--text-secondary,#64748b);
  ">
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiSmall()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">small</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiMedium()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">medium</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiBig()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">big</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiWorldComplete()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">world</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiLevelUp()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">level up</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiAchievement()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">achievement</div>
    <div style="padding:0.2rem 0.4rem;cursor:pointer;opacity:0.7" onclick="confettiLegendary()" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">LEGEND</div>
  </div>
  <script>
    // Toggle test menu by clicking the connection dot
    document.querySelector('.connection-status').addEventListener('click', () => {
      const m = document.getElementById('test-menu');
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    });
  </script>

  <script>
  'use strict';

  // === GAME DATA ===
  const WORLDS = {
    0: { name: 'A Oficina', tagline: 'Prepare suas ferramentas antes de construir.' },
    1: { name: 'O Mapa do Tesouro', tagline: 'Descubra o que existe antes de inventar.' },
    2: { name: 'A Planta da Fortaleza', tagline: 'Sem planta, voce constroi um barraco.' },
    3: { name: 'O Pergaminho das Stories', tagline: 'Quebre o elefante em pedacos mastigaveis.' },
    4: { name: 'A Forja', tagline: 'A linha de montagem. Aqui o codigo ganha vida.' },
    5: { name: 'O Tribunal da Qualidade', tagline: 'Tres inspetores. Nada passa sem julgamento.' },
    6: { name: 'O Portal do Deploy', tagline: 'So o @devops tem a chave do portal.' },
    7: { name: 'A Torre de Vigia', tagline: 'A casa foi entregue. Agora e manter limpa.' },
  };

  const LEVELS = [
    { min: 0, name: 'Apprentice Builder', quote: 'Todo mestre ja foi aprendiz.' },
    { min: 100, name: 'Junior Architect', quote: 'As fundacoes estao tomando forma.' },
    { min: 250, name: 'Code Warrior', quote: 'Voce ja sabe empunhar o teclado.' },
    { min: 450, name: 'Quality Guardian', quote: 'Nada passa sem sua aprovacao.' },
    { min: 650, name: 'Deploy Commander', quote: 'O campo de batalha e seu.' },
    { min: 850, name: 'Master Builder', quote: 'Poucos chegam aqui.' },
    { min: 1000, name: 'Legend', quote: 'Do zero ao deploy. Sem atalho. Sem medo.' },
  ];

  const ACHIEVEMENTS = {
    first_blood:    { icon: '\u2694\uFE0F', name: 'First Blood', desc: 'Primeira missao completa' },
    setup_complete: { icon: '\uD83C\uDFE0', name: 'Base Montada', desc: 'Fase 0 completa' },
    thinker:        { icon: '\uD83E\uDDE0', name: 'Pensador', desc: 'Brainstorming antes de codar' },
    architect:      { icon: '\uD83D\uDDC2\uFE0F', name: 'O Arquiteto', desc: 'PRD + Arquitetura prontos' },
    storyteller:    { icon: '\uD83D\uDCD6', name: 'Contador de Stories', desc: 'Stories criadas e validadas' },
    builder:        { icon: '\uD83D\uDD28', name: 'O Construtor', desc: 'Story implementada + QA ok' },
    quality_freak:  { icon: '\uD83D\uDC8E', name: 'Obcecado por Qualidade', desc: 'Vuln scan + Tier-S check' },
    test_warrior:   { icon: '\uD83D\uDEE1\uFE0F', name: 'Guerreiro dos Testes', desc: 'Bulletproof test executado' },
    shipper:        { icon: '\uD83D\uDE80', name: 'Shipper', desc: 'Deploy com sucesso' },
    completionist:  { icon: '\uD83D\uDC51', name: 'Completionist', desc: 'Tudo feito (inclusive opcionais)' },
    legend:         { icon: '\u2B50', name: 'Lenda', desc: '1000 XP — Do zero ao deploy' },
    scanner:        { icon: '\uD83D\uDD0D', name: 'Detetive', desc: 'Scan descobriu 3+ itens' },
    consistent:     { icon: '\uD83D\uDD17', name: 'Consistente', desc: '5 missoes em sequencia' },
    no_skip:        { icon: '\uD83D\uDEE4\uFE0F', name: 'Sem Atalho', desc: '0 missoes obrigatorias puladas' },
  };

  // === STATE ===
  let state = { phases: {}, total_xp: 0, achievements_unlocked: [], project: '' };
  let prevXp = 0;
  let ws = null;

  // === ZOOM CONTROL ===
  let currentZoom = parseInt(localStorage.getItem('pipeline-quest-zoom') || '100', 10);

  function applyZoom() {
    document.documentElement.style.fontSize = (currentZoom / 100 * 20) + 'px';
    const label = document.getElementById('zoom-label');
    if (label) label.textContent = currentZoom + '%';
    localStorage.setItem('pipeline-quest-zoom', String(currentZoom));
  }

  function changeZoom(delta) {
    currentZoom = Math.max(60, Math.min(200, currentZoom + delta));
    applyZoom();
  }

  // Apply saved zoom on load
  applyZoom();

  // === THEME SWITCHING ===
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-stylesheet').href = `/themes/${theme}.css`;
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.theme === theme);
    });
    localStorage.setItem('pipeline-quest-theme', theme);
  }

  // === YAML PARSING ===
  function parseChecklist(yamlStr) {
    try {
      return jsyaml.load(yamlStr);
    } catch (e) {
      console.error('YAML parse error:', e);
      return null;
    }
  }

  // === GAME LOGIC ===
  function getLevel(xp) {
    let level = LEVELS[0];
    for (let i = LEVELS.length - 1; i >= 0; i--) {
      if (xp >= LEVELS[i].min) { level = LEVELS[i]; break; }
    }
    const idx = LEVELS.indexOf(level);
    const next = LEVELS[idx + 1] || level;
    return { ...level, index: idx + 1, nextMin: next.min, nextName: next.name };
  }

  function calculateStats(data) {
    if (!data || !data.phases) return { total: 0, done: 0, skipped: 0, xp: 0, phases: {} };

    let total = 0, done = 0, skipped = 0, xp = 0;
    const phases = {};

    for (const [phaseId, phase] of Object.entries(data.phases)) {
      const items = phase.items || {};
      let pDone = 0, pTotal = 0, pSkipped = 0;

      for (const [itemId, item] of Object.entries(items)) {
        pTotal++;
        if (item.status === 'done') { pDone++; xp += (item.xp || 0); }
        else if (item.status === 'skipped') { pSkipped++; }
      }

      phases[phaseId] = { done: pDone, total: pTotal, skipped: pSkipped, name: phase.name, items };
      total += pTotal;
      done += pDone;
      skipped += pSkipped;
    }

    return { total, done, skipped, xp, phases };
  }

  function checkAchievements(data, stats) {
    const unlocked = new Set(data.achievements_unlocked || []);
    const p = stats.phases;

    const itemDone = (id) => {
      const [phase, item] = id.split('.');
      return p[phase]?.items?.[id]?.status === 'done';
    };

    const phaseDone = (id) => {
      const ph = p[id];
      if (!ph) return false;
      for (const [, item] of Object.entries(ph.items)) {
        if (item.required && item.status !== 'done') return false;
      }
      return true;
    };

    if (stats.done > 0) unlocked.add('first_blood');
    if (phaseDone('0')) unlocked.add('setup_complete');
    if (itemDone('1.1')) unlocked.add('thinker');
    if (itemDone('2.1') && itemDone('2.2')) unlocked.add('architect');
    if (itemDone('3.1') && itemDone('3.2')) unlocked.add('storyteller');
    if (itemDone('4.2') && itemDone('4.6')) unlocked.add('builder');
    if (itemDone('5.3') && itemDone('5.6')) unlocked.add('quality_freak');
    if (itemDone('4.4')) unlocked.add('test_warrior');
    if (itemDone('6.3') && itemDone('6.4')) unlocked.add('shipper');
    if (stats.xp >= 1000) unlocked.add('legend');
    if (stats.done === stats.total) unlocked.add('completionist');

    return [...unlocked];
  }

  // === CONFETTI EFFECTS ===
  let prevLevel = 0;
  let prevAchievements = [];
  let prevWorldsDone = new Set();

  // Small burst — mission complete (5-15 XP)
  function confettiSmall() {
    confetti({ particleCount: 30, spread: 50, origin: { y: 0.7 }, ticks: 80, gravity: 1.2 });
  }

  // Medium explosion — big mission (20-35 XP)
  function confettiMedium() {
    confetti({ particleCount: 80, spread: 80, origin: { y: 0.6 } });
  }

  // Big explosion — huge mission (40-50 XP)
  function confettiBig() {
    const count = 150;
    const defaults = { origin: { y: 0.6 }, ticks: 200 };
    confetti({ ...defaults, particleCount: count * 0.25, spread: 26, startVelocity: 55 });
    confetti({ ...defaults, particleCount: count * 0.20, spread: 60 });
    confetti({ ...defaults, particleCount: count * 0.35, spread: 100, decay: 0.91, scalar: 0.8 });
    confetti({ ...defaults, particleCount: count * 0.10, spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
    confetti({ ...defaults, particleCount: count * 0.10, spread: 120, startVelocity: 45 });
  }

  // School pride — world complete (two cannons from sides)
  function confettiWorldComplete() {
    const end = Date.now() + 2500;
    const colors = ['#00fff2', '#8b5cf6', '#ff00ff', '#22c55e', '#f59e0b'];
    (function frame() {
      confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors });
      confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
  }

  // Fireworks — level up
  function confettiLevelUp() {
    const duration = 3000;
    const end = Date.now() + duration;
    const interval = setInterval(function() {
      const timeLeft = end - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);
      confetti({
        particleCount: 50,
        startVelocity: 30,
        spread: 360,
        ticks: 60,
        origin: { x: Math.random(), y: Math.random() * 0.4 },
        colors: ['#ff0', '#0ff', '#f0f', '#0f0', '#ff6600'],
        gravity: 0.8,
      });
    }, 250);
  }

  // Stars — achievement unlocked
  function confettiAchievement() {
    const defaults = { spread: 360, ticks: 100, gravity: 0, decay: 0.94, startVelocity: 20 };
    function shoot() {
      confetti({ ...defaults, particleCount: 30, scalar: 1.2, shapes: ['star'], colors: ['#ffd700', '#ffec8b', '#fff8dc'] });
      confetti({ ...defaults, particleCount: 15, scalar: 0.75, shapes: ['circle'], colors: ['#ffd700', '#f59e0b'] });
    }
    setTimeout(shoot, 0);
    setTimeout(shoot, 200);
    setTimeout(shoot, 400);
  }

  // LEGENDARY — all effects combined (1000 XP)
  function confettiLegendary() {
    confettiBig();
    setTimeout(confettiWorldComplete, 500);
    setTimeout(confettiLevelUp, 1500);
    setTimeout(confettiAchievement, 3000);
    setTimeout(confettiBig, 4000);
  }

  // === CELEBRATION OVERLAY ===
  function showCelebration(title, xpText, desc, confettiFn) {
    const overlay = document.getElementById('celebration');
    document.getElementById('celeb-title').textContent = title;
    document.getElementById('celeb-xp').textContent = xpText;
    document.getElementById('celeb-desc').textContent = desc;
    overlay.classList.add('active');
    if (confettiFn) confettiFn();
    setTimeout(() => overlay.classList.remove('active'), 4000);
  }

  // === RENDERING ===
  function render(data) {
    if (!data || !data.phases) {
      document.getElementById('no-data').style.display = 'block';
      return;
    }

    const stats = calculateStats(data);
    const level = getLevel(stats.xp);
    const achievements = checkAchievements(data, stats);
    const percent = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
    const xpPercent = level.nextMin > level.min
      ? Math.round(((stats.xp - level.min) / (level.nextMin - level.min)) * 100)
      : 100;

    // Detect changes and trigger celebrations
    if (prevXp > 0 && stats.xp > prevXp) {
      const diff = stats.xp - prevXp;
      const newLevel = getLevel(stats.xp);

      // Check for LEGEND (1000 XP)
      if (stats.xp >= 1000 && prevXp < 1000) {
        setTimeout(() => showCelebration('L E N D A !', '1000 XP', 'Do zero ao deploy. Sem atalho. Sem medo.', confettiLegendary), 300);
      }
      // Check for LEVEL UP
      else if (newLevel.index > prevLevel && prevLevel > 0) {
        setTimeout(() => showCelebration('LEVEL UP!', `Level ${newLevel.index}`, newLevel.name, confettiLevelUp), 300);
      }
      // Check for WORLD COMPLETE
      else if (Object.entries(stats.phases).some(([id, ph]) => {
        const isComplete = ph.done >= ph.total - (ph.skipped || 0);
        return isComplete && !prevWorldsDone.has(id);
      })) {
        setTimeout(() => showCelebration('WORLD COMPLETE!', `+${diff} XP`, 'Proximo mundo desbloqueado!', confettiWorldComplete), 300);
      }
      // Big mission (40-50 XP)
      else if (diff >= 40) {
        setTimeout(() => showCelebration('MISSAO EPICA!', `+${diff} XP`, `Total: ${stats.xp} XP`, confettiBig), 300);
      }
      // Medium mission (20-35 XP)
      else if (diff >= 20) {
        setTimeout(() => showCelebration('MISSAO COMPLETA!', `+${diff} XP`, `Total: ${stats.xp} XP`, confettiMedium), 300);
      }
      // Small mission (5-15 XP)
      else if (diff >= 5) {
        confettiSmall();
      }
    }

    // Check for NEW ACHIEVEMENTS
    if (prevAchievements.length > 0 && achievements.length > prevAchievements.length) {
      const newOnes = achievements.filter(a => !prevAchievements.includes(a));
      if (newOnes.length > 0) {
        const ach = ACHIEVEMENTS[newOnes[0]];
        if (ach) {
          setTimeout(() => showCelebration('ACHIEVEMENT!', ach.icon, ach.name, confettiAchievement), 1500);
        }
      }
    }

    // Update previous state
    prevXp = stats.xp;
    prevLevel = level.index;
    prevAchievements = [...achievements];
    // Track completed worlds
    prevWorldsDone = new Set();
    Object.entries(stats.phases).forEach(([id, ph]) => {
      if (ph.done >= ph.total - (ph.skipped || 0)) prevWorldsDone.add(id);
    });

    // Find current world (first with pending items)
    let currentWorld = '7';
    for (let i = 0; i <= 7; i++) {
      const ph = stats.phases[i];
      if (ph && ph.done < ph.total - ph.skipped) {
        currentWorld = String(i);
        break;
      }
    }

    // Extract project name from various YAML structures
    let projectName = 'Projeto';
    if (data.project && typeof data.project === 'object') {
      projectName = data.project.name || 'Projeto';
    } else if (typeof data.project === 'string') {
      projectName = data.project;
    }

    const app = document.getElementById('app');
    document.getElementById('no-data').style.display = 'none';

    app.innerHTML = `
      <!-- Header -->
      <div class="header">
        <div>
          <div class="header-project">Pipeline Quest</div>
          <div class="header-title">${projectName}</div>
        </div>
        <div class="header-controls">
          <div class="zoom-controls">
            <button class="zoom-btn" onclick="changeZoom(-10)" title="Diminuir fonte">-</button>
            <span class="zoom-label" id="zoom-label">${currentZoom}%</span>
            <button class="zoom-btn" onclick="changeZoom(10)" title="Aumentar fonte">+</button>
          </div>
          <div class="theme-switcher">
            <button class="theme-btn" data-theme="cyberpunk" onclick="setTheme('cyberpunk')" title="Cyberpunk">\u26A1</button>
            <button class="theme-btn" data-theme="minimal" onclick="setTheme('minimal')" title="Minimal">\u25CB</button>
            <button class="theme-btn" data-theme="fantasy" onclick="setTheme('fantasy')" title="Fantasy">\u2694\uFE0F</button>
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value">${stats.xp}</div>
          <div class="stat-label">XP Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.done}/${stats.total}</div>
          <div class="stat-label">Missoes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${percent}%</div>
          <div class="stat-label">Progresso</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${achievements.length}/${Object.keys(ACHIEVEMENTS).length}</div>
          <div class="stat-label">Achievements</div>
        </div>
      </div>

      <!-- Level & XP -->
      <div class="level-section">
        <div class="level-header">
          <span class="level-badge">Lv.${level.index} ${level.name}</span>
          <span class="level-quote">"${level.quote}"</span>
        </div>
        <div class="xp-bar-container">
          <div class="xp-bar-fill" style="width: ${xpPercent}%"></div>
        </div>
        <div class="xp-text">
          <span>${stats.xp} XP</span>
          <span>${level.nextMin} XP</span>
        </div>
      </div>

      <!-- Worlds -->
      <div class="worlds-section">
        <div class="worlds-title">Quest Log</div>
        ${Object.entries(stats.phases).map(([id, ph]) => {
          const world = WORLDS[id] || { name: `World ${id}`, tagline: '' };
          const isComplete = ph.done >= ph.total - ph.skipped;
          const isActive = id === currentWorld;
          const isLocked = parseInt(id) > parseInt(currentWorld) + 1 && !isComplete;
          const phPercent = ph.total > 0 ? Math.round((ph.done / ph.total) * 100) : 0;
          const statusClass = isComplete ? 'world-complete' : isActive ? 'world-active' : isLocked ? 'world-locked' : '';
          const statusIcon = isComplete ? '\u2705' : isActive ? '\uD83D\uDD04' : isLocked ? '\uD83D\uDD12' : '\u2B1C';

          return `
            <div class="world-card ${statusClass} ${isActive ? 'expanded' : ''}"
                 onclick="this.classList.toggle('expanded')">
              <div class="world-header">
                <span class="world-name">${statusIcon} World ${id}: ${world.name}</span>
                <span class="world-status">${ph.done}/${ph.total}</span>
              </div>
              <div class="world-tagline">${world.tagline}</div>
              <div class="world-progress">
                <div class="world-progress-fill" style="width: ${phPercent}%"></div>
              </div>
              <div class="missions-list">
                ${Object.entries(ph.items).map(([itemId, item]) => {
                  const isDone = item.status === 'done';
                  const isSkipped = item.status === 'skipped';
                  const statusCls = isDone ? 'done' : isSkipped ? 'skipped' : 'pending';
                  const iconCls = isDone ? 'done' : isSkipped ? 'skipped' : 'pending';
                  const iconText = isDone ? '\u2713' : isSkipped ? '\u2013' : '';
                  return `
                    <div class="mission ${statusCls}">
                      <div class="mission-icon ${iconCls}">${iconText}</div>
                      <div class="mission-label">${itemId} ${item.label}</div>
                      <div class="mission-xp">+${item.xp || 0}</div>
                      ${item.note ? `<div class="mission-note">${item.note}</div>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <!-- Achievements -->
      <div class="achievements-section">
        <div class="achievements-title">Achievements (${achievements.length}/${Object.keys(ACHIEVEMENTS).length})</div>
        <div class="achievements-grid">
          ${Object.entries(ACHIEVEMENTS).map(([key, ach]) => {
            const isUnlocked = achievements.includes(key);
            return `
              <div class="achievement ${isUnlocked ? 'unlocked' : 'locked'}" title="${ach.desc}">
                <div class="achievement-icon">${ach.icon}</div>
                <div class="achievement-name">${isUnlocked ? ach.name : '???'}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;

    // Update theme buttons
    const currentTheme = localStorage.getItem('pipeline-quest-theme') || 'cyberpunk';
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.theme === currentTheme);
    });
  }

  // === WEBSOCKET ===
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      document.getElementById('conn-dot').className = 'connection-dot connected';
      document.getElementById('conn-text').textContent = 'Conectado';
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'checklist_update') {
          const data = parseChecklist(msg.data);
          if (data) {
            state = data;
            render(data);
          }
        } else if (msg.type === 'no_checklist') {
          document.getElementById('no-data').style.display = 'block';
        }
      } catch (e) {
        console.error('WS message error:', e);
      }
    };

    ws.onclose = () => {
      document.getElementById('conn-dot').className = 'connection-dot disconnected';
      document.getElementById('conn-text').textContent = 'Desconectado — reconectando...';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // === INIT ===
  (function init() {
    // Load saved theme
    const savedTheme = localStorage.getItem('pipeline-quest-theme') || 'cyberpunk';
    setTheme(savedTheme);

    // Connect WebSocket
    connectWS();

    // Also try loading via API (fallback)
    fetch('/api/checklist')
      .then(r => r.ok ? r.text() : null)
      .then(text => {
        if (text) {
          const data = parseChecklist(text);
          if (data) { state = data; render(data); }
        }
      })
      .catch(() => {});
  })();
  </script>
</body>
</html>
