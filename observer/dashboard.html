<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOX Visual Observer</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cyan: #56d364;
    --orange: #e3b341;
    --radius: 6px;
    --font: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  #header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  #header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.5px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid currentColor;
  }

  .badge.connected    { color: var(--green); background: rgba(63,185,80,.08); }
  .badge.disconnected { color: var(--red);   background: rgba(248,81,73,.08); }
  .badge.connecting   { color: var(--yellow);background: rgba(210,153,34,.08); }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  #header-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* ── Grid layout ── */
  #main {
    padding: 12px;
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
  }

  @media (max-width: 700px) {
    #main { grid-template-columns: 1fr; }
  }

  /* ── Panel cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 8px 12px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-body {
    padding: 12px;
  }

  /* ── Agent card ── */
  #agent-card { grid-column: 1; }

  #agent-id {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 4px;
  }

  #agent-name {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .agent-field {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 12px;
  }

  .agent-field .label {
    color: var(--text-dim);
    min-width: 50px;
  }

  .agent-field .value {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Pipeline card ── */
  #pipeline-card { grid-column: 2; }

  @media (max-width: 700px) {
    #agent-card, #pipeline-card { grid-column: 1; }
  }

  .stage-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stage {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .stage.done    { background: rgba(63,185,80,.07); }
  .stage.active  { background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.3); }
  .stage.pending { opacity: 0.45; }

  .stage-icon { font-size: 12px; width: 16px; text-align: center; }
  .stage-name { flex: 1; text-transform: capitalize; font-size: 12px; }
  .stage-name .replace-underscore { text-transform: capitalize; }

  /* ── Terminals card ── */
  #terminals-card { grid-column: 1 / -1; }

  .terminal-list { display: flex; flex-direction: column; gap: 4px; }

  .terminal-row {
    display: flex;
    gap: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--bg3);
    font-size: 12px;
    align-items: center;
  }

  .terminal-agent { color: var(--purple); min-width: 60px; }
  .terminal-pid   { color: var(--text-dim); min-width: 70px; }
  .terminal-task  { color: var(--text); overflow: hidden; text-overflow: ellipsis; }

  .empty-msg { color: var(--text-dim); font-size: 12px; padding: 4px 0; }

  /* ── Event log ── */
  #log-card { grid-column: 1 / -1; }

  #log-filter {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
  }

  #log-container {
    height: 280px;
    overflow-y: auto;
    padding: 6px 4px;
  }

  #log-container::-webkit-scrollbar { width: 6px; }
  #log-container::-webkit-scrollbar-track { background: var(--bg2); }
  #log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-row {
    display: flex;
    gap: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
    align-items: baseline;
    transition: background 0.1s;
  }

  .log-row:hover { background: var(--bg3); }

  .log-time  { color: var(--text-dim); min-width: 65px; flex-shrink: 0; }
  .log-type  { min-width: 160px; flex-shrink: 0; font-weight: 600; }
  .log-data  { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Event type colors */
  .evt-bob    { color: var(--blue); }
  .evt-agent  { color: var(--purple); }
  .evt-cmd    { color: var(--cyan); }
  .evt-story  { color: var(--orange); }
  .evt-error  { color: var(--red); }
  .evt-session{ color: var(--yellow); }
  .evt-other  { color: var(--text-dim); }

  /* ── Metrics bar ── */
  #metrics {
    display: flex;
    gap: 20px;
    padding: 6px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .metric { display: flex; gap: 5px; }
  .metric .val { color: var(--text); font-weight: 600; }

  /* ── Auto-scroll toggle ── */
  #autoscroll-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }

  #autoscroll-btn.on { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>⬡ AIOX Visual Observer</h1>
  <span id="conn-badge" class="badge connecting"><span class="dot"></span> connecting…</span>
  <div id="header-meta">
    <span>session: <span id="session-id">—</span></span>
    <span>uptime: <span id="uptime">0s</span></span>
    <span>clients: <span id="client-count">—</span></span>
  </div>
</div>

<!-- Main grid -->
<div id="main">

  <!-- Active Agent -->
  <div class="card" id="agent-card">
    <div class="card-header">Active Agent</div>
    <div class="card-body">
      <div id="agent-id">—</div>
      <div id="agent-name">no active agent</div>
      <div class="agent-field">
        <span class="label">task</span>
        <span class="value" id="agent-task">—</span>
      </div>
      <div class="agent-field">
        <span class="label">story</span>
        <span class="value" id="agent-story">—</span>
      </div>
      <div class="agent-field">
        <span class="label">phase</span>
        <span class="value" id="agent-phase">—</span>
      </div>
    </div>
  </div>

  <!-- Pipeline -->
  <div class="card" id="pipeline-card">
    <div class="card-header">Pipeline Progress</div>
    <div class="card-body">
      <div class="stage-list" id="stage-list"></div>
    </div>
  </div>

  <!-- Active Terminals -->
  <div class="card" id="terminals-card">
    <div class="card-header">Active Terminals <span id="terminal-count" style="color:var(--text-dim);font-weight:normal"></span></div>
    <div class="card-body">
      <div class="terminal-list" id="terminal-list">
        <span class="empty-msg">no active terminals</span>
      </div>
    </div>
  </div>

  <!-- Event Log -->
  <div class="card" id="log-card">
    <div class="card-header">
      Event Log <span id="log-count" style="color:var(--text-dim);font-weight:normal;margin-left:6px"></span>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="log-filter">
          <option value="">all types</option>
          <option value="Bob">Bob events</option>
          <option value="Agent">Agent events</option>
          <option value="Command">Command events</option>
          <option value="Story">Story events</option>
          <option value="Session">Session events</option>
        </select>
        <button id="autoscroll-btn" class="on" title="Toggle auto-scroll">↓ auto</button>
      </div>
    </div>
    <div id="log-container"></div>
  </div>

</div>

<!-- Metrics bar -->
<div id="metrics">
  <div class="metric">total events: <span class="val" id="m-total">0</span></div>
  <div class="metric">events/min: <span class="val" id="m-rate">0</span></div>
  <div class="metric">ws clients: <span class="val" id="m-clients">0</span></div>
  <div class="metric">bob-status: <span class="val" id="m-bob">—</span></div>
</div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────

const MAX_LOG_ROWS = 500;
const logRows = [];          // { event, el }
let autoScroll = true;
let reconnectDelay = 1000;
let ws = null;
let startedAt = Date.now();
let serverUptime = 0;

// ── Pipeline stages ───────────────────────────────────────────────────────────

const STAGES = [
  'validation',
  'development',
  'self_healing',
  'quality_gate',
  'push',
  'checkpoint',
];

// ── DOM helpers ───────────────────────────────────────────────────────────────

function $(id) { return document.getElementById(id); }

function setText(id, text) {
  const el = $(id);
  if (el) el.textContent = text;
}

function fmt(ms) {
  const d = new Date(ms);
  return d.toTimeString().slice(0, 8);
}

function fmtUptime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

// ── Event type classification ─────────────────────────────────────────────────

function classifyEvent(type) {
  if (!type) return 'evt-other';
  if (type.startsWith('Bob')) return 'evt-bob';
  if (type.startsWith('Agent')) return 'evt-agent';
  if (type.startsWith('Command')) return 'evt-cmd';
  if (type.startsWith('Story')) return 'evt-story';
  if (type.includes('Error')) return 'evt-error';
  if (type.startsWith('Session')) return 'evt-session';
  return 'evt-other';
}

function summarizeData(event) {
  const d = event.data || {};
  const parts = [];
  if (event.aiox_agent) parts.push(event.aiox_agent);
  if (event.aiox_story_id) parts.push('story:' + event.aiox_story_id);
  if (d.phase || d.stageName) parts.push(d.phase || d.stageName);
  if (d.task) parts.push(d.task);
  if (d.agent) parts.push(d.agent);
  if (d.command) parts.push(d.command);
  if (d.message) parts.push(d.message.slice(0, 60));
  return parts.join('  ');
}

// ── Pipeline rendering ────────────────────────────────────────────────────────

let currentPipeline = { current: null, completed: [] };

function renderPipeline(pipeline) {
  if (pipeline) currentPipeline = pipeline;
  const list = $('stage-list');
  if (!list) return;

  list.innerHTML = '';
  const { current, completed } = currentPipeline;

  STAGES.forEach((stage) => {
    const isDone   = completed && completed.includes(stage);
    const isActive = stage === current;
    const row = document.createElement('div');
    row.className = 'stage ' + (isDone ? 'done' : isActive ? 'active' : 'pending');

    const icon = isDone ? '✓' : isActive ? '●' : '○';
    const iconClass = isDone ? 'color:var(--green)' : isActive ? 'color:var(--blue)' : '';
    const iconSpan = document.createElement('span');
    iconSpan.className = 'stage-icon';
    iconSpan.style.cssText = iconClass;
    iconSpan.textContent = icon;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'stage-name';
    nameSpan.textContent = stage.replace(/_/g, ' ');
    row.appendChild(iconSpan);
    row.appendChild(nameSpan);

    list.appendChild(row);
  });
}

// ── Terminals rendering ───────────────────────────────────────────────────────

function renderTerminals(terminals) {
  const list = $('terminal-list');
  if (!list) return;
  if (!terminals || terminals.length === 0) {
    list.innerHTML = '<span class="empty-msg">no active terminals</span>';
    setText('terminal-count', '');
    return;
  }
  setText('terminal-count', `(${terminals.length})`);
  list.innerHTML = '';
  terminals.forEach((t) => {
    const row = document.createElement('div');
    row.className = 'terminal-row';
    const agentSpan = document.createElement('span');
    agentSpan.className = 'terminal-agent';
    agentSpan.textContent = t.agent || '?';
    const pidSpan = document.createElement('span');
    pidSpan.className = 'terminal-pid';
    pidSpan.textContent = 'pid:' + (t.pid || '?');
    const taskSpan = document.createElement('span');
    taskSpan.className = 'terminal-task';
    taskSpan.textContent = t.task || '';
    row.appendChild(agentSpan);
    row.appendChild(pidSpan);
    row.appendChild(taskSpan);
    list.appendChild(row);
  });
}

// ── Agent card update ─────────────────────────────────────────────────────────

function updateAgentCard(state) {
  const agentId = state.currentAgent;
  const agents  = state.activeAgents || {};

  if (agentId && agents[agentId]) {
    const a = agents[agentId];
    setText('agent-id', agentId);
    setText('agent-name', a.name || agentId);
    setText('agent-task', a.task || '—');
  } else if (agentId) {
    setText('agent-id', agentId);
    setText('agent-name', '');
    setText('agent-task', '—');
  } else {
    setText('agent-id', '—');
    setText('agent-name', 'no active agent');
    setText('agent-task', '—');
  }

  setText('agent-story', state.currentStory || '—');
  setText('agent-phase', state.currentPhase || '—');
}

// ── State application ─────────────────────────────────────────────────────────

function applyState(state) {
  if (!state) return;

  if (state.sessionId) setText('session-id', state.sessionId.slice(0, 12) + '…');
  if (state.uptime !== undefined) serverUptime = state.uptime;
  if (state.connectedClients !== undefined) {
    setText('client-count', state.connectedClients);
    setText('m-clients', state.connectedClients);
  }

  updateAgentCard(state);
  renderPipeline(state.pipeline);

  // Bob status terminals
  if (state.bobStatus && state.bobStatus.active_terminals) {
    renderTerminals(state.bobStatus.active_terminals);
  }

  // Metrics
  if (state.metrics) {
    setText('m-total', state.metrics.total || 0);
    setText('m-rate', state.metrics.eventsPerMin || 0);
  }

  if (state.bobStatus) {
    setText('m-bob', '✓ live');
  }
}

// ── Log rendering ─────────────────────────────────────────────────────────────

const filterEl = $('log-filter');
let filterValue = '';
if (filterEl) filterEl.addEventListener('change', () => {
  filterValue = filterEl.value;
  applyLogFilter();
});

function applyLogFilter() {
  logRows.forEach(({ event, el }) => {
    const type = event.type || '';
    el.style.display = (!filterValue || type.includes(filterValue)) ? '' : 'none';
  });
}

function appendEventToLog(event) {
  const container = $('log-container');
  if (!container) return;

  // Trim if over limit
  if (logRows.length >= MAX_LOG_ROWS) {
    const removed = logRows.shift();
    if (removed && removed.el && removed.el.parentNode) {
      removed.el.parentNode.removeChild(removed.el);
    }
  }

  const row = document.createElement('div');
  row.className = 'log-row';

  const ts = event.timestamp ? fmt(event.timestamp) : fmt(Date.now());
  const type = event.type || 'unknown';
  const typeClass = classifyEvent(type);
  const summary = summarizeData(event);

  const timeSpan = document.createElement('span');
  timeSpan.className = 'log-time';
  timeSpan.textContent = ts;
  const typeSpan = document.createElement('span');
  typeSpan.className = 'log-type ' + typeClass;
  typeSpan.textContent = type;
  const dataSpan = document.createElement('span');
  dataSpan.className = 'log-data';
  dataSpan.textContent = summary;
  row.appendChild(timeSpan);
  row.appendChild(typeSpan);
  row.appendChild(dataSpan);

  // Apply current filter
  if (filterValue && !type.includes(filterValue)) {
    row.style.display = 'none';
  }

  container.appendChild(row);
  logRows.push({ event, el: row });

  setText('log-count', `(${logRows.length})`);
  setText('m-total', liveState.metrics.total || logRows.length);

  if (autoScroll) {
    container.scrollTop = container.scrollHeight;
  }
}

// ── State delta updates from single event ────────────────────────────────────

let liveState = {
  currentAgent: null,
  currentPhase: null,
  currentStory: null,
  activeAgents: {},
  pipeline: { stages: STAGES, current: null, completed: [] },
  bobStatus: null,
  metrics: { total: 0, eventsPerMin: 0 },
  connectedClients: 0,
};

function applyEventDelta(event) {
  const type = event.type;
  const data = event.data || {};

  if (event.aiox_story_id) liveState.currentStory = event.aiox_story_id;
  if (event.aiox_agent) liveState.currentAgent = event.aiox_agent;

  liveState.metrics.total += 1;

  switch (type) {
    case 'BobPhaseChange': {
      const phase = data.phase || data.stageName;
      if (phase) {
        liveState.currentPhase = phase;
        liveState.pipeline.current = phase;
        const idx = STAGES.indexOf(phase);
        if (idx > 0) {
          liveState.pipeline.completed = STAGES.slice(0, idx);
        }
      }
      break;
    }

    case 'BobAgentSpawned': {
      const agentId = data.agent || data.agentId;
      if (agentId) {
        liveState.activeAgents[agentId] = {
          name: data.agentName || agentId,
          task: data.task || null,
          pid: data.pid || null,
        };
        liveState.currentAgent = agentId;
      }
      if (liveState.bobStatus && data.agent && data.pid) {
        liveState.bobStatus.active_terminals = liveState.bobStatus.active_terminals || [];
        liveState.bobStatus.active_terminals.push({ agent: data.agent, pid: data.pid, task: data.task });
        renderTerminals(liveState.bobStatus.active_terminals);
      }
      break;
    }

    case 'BobAgentCompleted': {
      const agentId = data.agent || data.agentId;
      if (agentId) delete liveState.activeAgents[agentId];
      break;
    }

    case 'AgentActivated': {
      const agentId = data.agentId || event.aiox_agent;
      if (agentId) {
        liveState.activeAgents[agentId] = { name: data.agentName || data.persona || agentId, task: null };
        liveState.currentAgent = agentId;
      }
      break;
    }

    case 'AgentDeactivated': {
      const agentId = data.agentId || event.aiox_agent;
      if (agentId) delete liveState.activeAgents[agentId];
      break;
    }

    case 'SessionEnd': {
      liveState.activeAgents = {};
      liveState.currentPhase = null;
      liveState.currentAgent = null;
      liveState.pipeline.current = null;
      liveState.pipeline.completed = [];
      renderTerminals([]);
      break;
    }

    default:
      break;
  }

  updateAgentCard(liveState);
  renderPipeline(liveState.pipeline);
  setText('agent-phase', liveState.currentPhase || '—');
}

// ── WebSocket message handler ─────────────────────────────────────────────────

function handleMessage(msg) {
  if (!msg || !msg.type) return;

  switch (msg.type) {
    case 'init': {
      const { state, recentEvents } = msg.data || {};
      if (state) {
        liveState = Object.assign(liveState, state);
        applyState(state);
      }
      if (recentEvents && Array.isArray(recentEvents)) {
        recentEvents.forEach(appendEventToLog);
      }
      break;
    }

    case 'event': {
      const event = msg.data;
      appendEventToLog(event);
      applyEventDelta(event);
      break;
    }

    case 'status_update': {
      const data = msg.data;
      liveState.bobStatus = data;
      if (data) {
        if (data.pipeline) {
          liveState.pipeline.current = data.pipeline.current_stage;
          liveState.pipeline.completed = data.pipeline.completed_stages || [];
          liveState.currentPhase = liveState.pipeline.current || null;
          renderPipeline(liveState.pipeline);
          setText('agent-phase', liveState.pipeline.current || '—');
        }
        if (data.current_agent && data.current_agent.id) {
          liveState.currentAgent = data.current_agent.id;
          updateAgentCard(liveState);
        }
        if (data.active_terminals) {
          renderTerminals(data.active_terminals);
        }
        setText('m-bob', '✓ live');
      }
      break;
    }

    default:
      break;
  }
}

// ── WebSocket connection ──────────────────────────────────────────────────────

function setConnStatus(status) {
  const badge = $('conn-badge');
  if (!badge) return;
  badge.className = 'badge ' + status;
  badge.innerHTML = '<span class="dot"></span> ' + status;
}

function connect() {
  try {
    ws = new WebSocket('ws://' + location.host + '/ws');
  } catch (e) {
    setConnStatus('disconnected');
    scheduleReconnect();
    return;
  }

  setConnStatus('connecting');

  ws.onopen = () => {
    setConnStatus('connected');
    reconnectDelay = 1000;
  };

  ws.onmessage = (e) => {
    try {
      handleMessage(JSON.parse(e.data));
    } catch (_e) {
      // Malformed message — ignore
    }
  };

  ws.onclose = () => {
    setConnStatus('disconnected');
    scheduleReconnect();
  };

  ws.onerror = () => {
    setConnStatus('disconnected');
  };
}

function scheduleReconnect() {
  setTimeout(() => {
    setConnStatus('connecting');
    connect();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 2, 16000);
}

// ── Auto-scroll toggle ────────────────────────────────────────────────────────

const autoscrollBtn = $('autoscroll-btn');
if (autoscrollBtn) {
  autoscrollBtn.addEventListener('click', () => {
    autoScroll = !autoScroll;
    autoscrollBtn.className = autoScroll ? 'on' : '';
    autoscrollBtn.textContent = autoScroll ? '↓ auto' : '⏸ paused';
  });
}

// ── Uptime ticker ─────────────────────────────────────────────────────────────

setInterval(() => {
  const elapsed = Date.now() - startedAt + serverUptime;
  setText('uptime', fmtUptime(elapsed));
}, 1000);

// ── Initial render ────────────────────────────────────────────────────────────

renderPipeline({ stages: STAGES, current: null, completed: [] });

// ── Boot ──────────────────────────────────────────────────────────────────────

connect();
</script>
</body>
</html>
