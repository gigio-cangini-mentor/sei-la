# Forge Configuration
# Default values for pipeline execution

version: "1.0.0"

# Retry limits
retry:
  max_per_story: 3          # Max retries for @dev before escalation
  max_veto_fixes: 2         # Max veto fix attempts before sending to @qa
  max_qa_loops: 5           # Max QA-Dev iterations (matches AIOS default)

# Checkpoint intervals
checkpoints:
  stories_interval: 3       # Show checkpoint every N stories in Build Loop
  always_checkpoint_phases:  # Phases that ALWAYS pause for user approval
    - 0   # Discovery (confirm scope)
    - 5   # Deploy (confirm push)

# Agent dispatch
agents:
  default_mode: yolo         # Execution mode for agent dispatch (yolo/interactive)
  dev_model: opus            # Model for @dev (heavy lifting)
  qa_model: sonnet           # Model for @qa (review)
  sm_model: sonnet           # Model for @sm (story creation)
  po_model: sonnet           # Model for @po (validation)
  devops_model: sonnet       # Model for @devops (deploy)

# State management
state:
  runs_dir: ".aios/forge-runs"
  state_file: "state.json"

# Quality gates (veto conditions)
quality:
  run_lint: true
  run_typecheck: true
  run_tests: true
  run_build: false           # Only in Phase 4 (Integration)

# Extended Quality Gates (Phase 4 — conditional)
# Each gate has a detection condition. If condition is false, gate is skipped.
extended_quality:
  bulletproof_test:
    enabled: true
    skill: "skills/bulletproof-test/SKILL.md"
    detect: "npm test OR test framework present"  # package.json has test script
    phase: 4                  # After all stories, before deploy
    modes: [FULL_APP]         # Skip for feature/bugfix
    severity: recommended     # Not a hard veto — CONCERNS if skipped
    model: sonnet

  vulnerability_scanner:
    enabled: true
    skill: "skills/vulnerability-scanner/SKILL.md"
    detect: always            # Security is universal
    phase: 4
    modes: [FULL_APP, SINGLE_FEATURE]
    severity: recommended
    model: sonnet

  tier_s_checklist:
    enabled: true
    skill: "skills/tier-s-checklist/SKILL.md"
    detect: always            # Production readiness is universal
    phase: 4
    modes: [FULL_APP]         # Only for full apps going to production
    severity: recommended
    model: sonnet

  tokenizacao:
    enabled: true
    skill: "skills/tokenizacao/SKILL.md"
    detect: "tailwind.config OR next.config OR angular.json OR React detected"
    phase: 4
    modes: [FULL_APP, SINGLE_FEATURE]
    severity: optional        # Informational, not a veto
    model: haiku

  code_refactoring:
    enabled: true
    skill: "skills/code-refactoring-refactor-clean/SKILL.md"
    detect: "qa_reported_tech_debt OR code_smells_detected"
    phase: 4
    modes: [FULL_APP]
    severity: optional
    model: sonnet

  cloud_pentest:
    enabled: false            # Disabled by default — opt-in only
    skill: "skills/cloud-penetration-testing/SKILL.md"
    detect: "terraform OR pulumi OR aws-cdk OR .aws/ OR gcloud"
    phase: 4
    modes: [FULL_APP]
    severity: optional
    model: sonnet

# Ecosystem scanner (MANDATORY)
ecosystem:
  minds_index: "squads/mind-cloning/minds/INDEX.md"
  skills_dir: "skills/"
  squads_dir: "squads/"
  max_context_items: 3       # Max minds/skills injected per agent dispatch
