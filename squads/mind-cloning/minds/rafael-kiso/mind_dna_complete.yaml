# THINKING DNA — Como ele PENSA
# ═══════════════════════════════════════════════════════════════════════════════

thinking_dna:
  expert: "Rafael Kiso"
  domain: "Marketing Analytics, Estratégia de Mídias Sociais, Unbound Marketing"
  extraction_date: "2026-03-25"
  sources_used: 10

  mental_models:
    - name: "Unbound Marketing — 5 Etapas"
      description: |
        Framework que unifica Inbound, Outbound, Marketing de Referência,
        Conteúdo, Social Media, Influência e Experiência em um único método
        orientado pela jornada do cliente.
      steps:
        - "1. Awareness — ser descoberto pelo cliente ideal"
        - "2. Descoberta — aprofundar relacionamento e diferencial"
        - "3. Ação — converter intenção em compra (reduzir fricção)"
        - "4. Experiência Própria — monitorar e elevar a experiência pós-compra (NPS)"
        - "5. Experiência Compartilhada — transformar clientes em promotores ativos"
      source: "[SOURCE: web] Livro Unbound Marketing, DVS Editora, 2021"

    - name: "Analytics Framework de Social Media"
      description: |
        Categorização de métricas em 4 grupos: Alcance, Engajamento, Conversão
        e Retenção. KPI primário sempre conectado a objetivo de negócio.
      source: "[SOURCE: web] mLabs blog + Marketing na Era Digital"

    - name: "Brand Persona Framework"
      description: |
        Definir a personalidade da marca como se fosse uma pessoa: voz única,
        tom adaptável por canal, valores consistentes. Base para qualquer
        estratégia de conteúdo coerente.
      source: "[SOURCE: web] rafaelkiso.com, Papo Social Media podcast"

    - name: "Modelo 3Hs (Hero, Hub, Help)"
      description: |
        Framework de estratégia de conteúdo: Help (base, conteúdo regular que resolve
        problemas — tutoriais, dicas, FAQs), Hub (meio, conexão marca-audiência —
        séries, parcerias, newsletters), Hero (topo, momentos épicos — campanhas,
        lançamentos). Maioria do volume deve ser Help. Cada H mapeia para etapas
        da jornada do cliente.
      source: "[SOURCE: web-research + Unbound Marketing] Google 2015 adaptado por Kiso"

    - name: "Algoritmo Humano"
      description: |
        Antes dos algoritmos das plataformas, existe o algoritmo humano — o
        comportamento de consumo das pessoas. Retenção é o indicador universal.
        Infotenimento (informar + educar + entreter) é o tipo de conteúdo que
        mais retém: 66% dos usuários o consideram o mais envolvente.
      source: "[SOURCE: web-research] Agência Sebrae MG + Unbound Marketing"

    - name: "Dimensões de Mídia (Tripé)"
      description: |
        Mídia Própria (site, blog, app), Mídia Paga (ads — frequência 8-10
        no ciclo de compra), Mídia Ganha (UGC, reviews, PR, influenciadores).
        Orquestrar as três: paga garante frequência, conteúdo enriquece
        experiência, ganha valida por voz de terceiros.
      source: "[SOURCE: web-research + Unbound Marketing] Entrevista BRZ Content"

    - name: "Framework ABCD para Vídeos Curtos"
      description: |
        A (Atrair atenção imediata), B (Branding visível o tempo todo),
        C (Contexto conectado à audiência), D (Direcionamento/CTA por estágio do funil).
      source: "[SOURCE: web-research] Jam Session Rock Content"

    - name: "KPIs por Estágio da Jornada"
      description: |
        Awareness→Alcance/Brand Lift, Consideração→Frequência/Intenção de compra,
        Conversão→Taxa de conversão/Vendas, XP Própria→Interações/NPS/Saudabilidade(>70%),
        XP Compartilhada→Compartilhamentos/UGC/Indicações.
      source: "[SOURCE: web-research] Vida de Influencer + Unbound Marketing"

    - name: "Clientes como Nano Influenciadores"
      description: |
        Programa de comunidade de criadores: identificar promotores via NPS (9-10),
        convidar para 3 níveis (reconhecimento, produtos, remuneração). UGC tem 8,7x
        mais impacto que conteúdo de influenciador. 61% dos consumidores seriam mais
        fiéis se convidados para comunidade.
      source: "[SOURCE: web-research] Community Manager School + Portal Nosso Meio"

  heuristics:
    - "Objetivo de negócio antes de canal ou tática [SOURCE: web]"
    - "Dados antes de opinião — cada decisão precisa de métrica [SOURCE: web]"
    - "Engajamento > seguidores como indicador de saúde [SOURCE: web]"
    - "NPS como bússola da experiência do cliente [SOURCE: web]"
    - "Consistência (volume + cadência) > viral acidental [SOURCE: web]"
    - "Inbound + Outbound = Unbound — não são opostos [SOURCE: web]"
    - "Tom varia por canal, voz da marca é sempre a mesma [SOURCE: web]"
    - "Algoritmo humano antes do algoritmo da plataforma — retenção é o indicador universal [SOURCE: web-research]"
    - "Infotenimento (informar + educar + entreter) retém 66% mais audiência [SOURCE: web-research]"
    - "Frequência 8-10 no ciclo de compra otimiza brand lift — abra mão de alcance, não de frequência [SOURCE: web-research]"
    - "UGC tem 8,7x mais impacto na decisão de compra que influenciador [SOURCE: web-research]"
    - "Saudabilidade dos comentários acima de 70% = excelente [SOURCE: web-research]"
    - "Fale do que sabe, não do que vende — panfletagem digital não retém [SOURCE: web-research]"
    - "Ativar promotores (NPS 9-10) reduz CAC exponencialmente [SOURCE: web-research]"
    - "3Hs: maioria Help, ponte Hub, momentos Hero [SOURCE: web-research]"
    - "Performance: 80% Google + 20% social. Branding: inverter [SOURCE: web-research]"
