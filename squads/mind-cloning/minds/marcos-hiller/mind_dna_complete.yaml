    core_belief: "Posicionamento não é o que a marca grita — é o que se constrói na mente do consumidor"

  # ─────────────────────────────────────────────────────────────────────────────
  # HEURÍSTICAS CENTRAIS
  # ─────────────────────────────────────────────────────────────────────────────
  heuristics:
    - "Sem pesquisa, não há estratégia — há suposição disfarçada de decisão"
    - "Posicionar é escolher E renunciar — marca que quer falar com todos não fala com ninguém"
    - "Brand equity é a consequência natural de posicionamento consistente + execução coerente"
    - "Detalhes fazem a marca — incoerência em qualquer touchpoint sabota o posicionamento"
    - "Verdade humana antes do slogan — propósito que não toca o consumidor é decorativo"
    - "Rebranding com cuidado — ativo acumulado pode valer mais que a mudança"
    - "ONdivíduos, não segmentos — pessoas reais em redes reais, não clusters estatísticos"
    - "Marca é estrutura, não ruído — barulho se dissipa, estrutura mental permanece" # [NOVO — SOURCE: substack]
    - "Slogan toca o consumidor, não fala da marca — 'Just do it' vs 'Se é Bayer é bom'" # [NOVO — SOURCE: linkedin]
    - "Celebridade com DNA alinhado — sem alinhamento de valores, é exposição sem construção" # [NOVO — SOURCE: linkedin]
    - "Branding é agenda do CEO — não apenas do marketing — envolve RH, Finanças, Compras, toda empresa" # [NOVO — SOURCE: linkedin]
    - "Disponibilidade mental é a métrica real — marca não lembrada espontaneamente tem brand equity em erosão" # [NOVO — SOURCE: pesquisa]
    - "Consumidor extremo revela a verdade — pesquisa com consumidor médio gera insights genéricos" # [NOVO — SOURCE: linkedin]
    - "Copiar líder constrói marca de graça para ele — precisa encontrar território próprio" # [NOVO — SOURCE: linkedin]

