  # ─── IDENTIDADE ─────────────────────────────────────────────────────────────
  identity:
    background: |
      Ex-auxiliar de enfermagem e animadora de festas, criada em comunidade no Rio de Janeiro.
      Começou a trabalhar aos 13 anos como representante Avon e estagiária de fast-food.
      Aos 17: primeiro emprego formal em rede de fast-food. Aos 20: migrou para telemarketing.
      Carga de 6h no telemarketing permitia manter dois empregos paralelos (até os 27).
      Ganhava menos de R$ 2.000/mês com dois empregos somados. Salário de enfermagem: R$ 950/mês.
      Cuidava dos dois irmãos para a mãe poder trabalhar.
      A pandemia eliminou a renda das festas. A mãe perdeu emprego de faxineira.
      Família chegou a receber cestas básicas da igreja.
      Criava conteúdo no Instagram como hobby desde 2015 (moda/beleza), mas sem resultados.
      Descobriu em 2021 que pessoas ganhavam dinheiro online com poucos seguidores.
      Criou Instagram NOVO do zero — sem seguidores, sem suporte, sem dinheiro.
      Encontrou o nicho ao focar em empoderamento feminino e empreendedorismo.
      Começou como afiliada em junho de 2021 com 1.900 seguidores e 2 horas/dia.
      Primeiro mês: R$ 1.200 (acima do salário de enfermagem). Segundo mês: R$ 15.000.
      Meta inicial: R$ 5.000/mês para largar emprego de enfermeira.
      Em 6 meses: R$ 1 milhão acumulado usando 100% conteúdo orgânico.
      Em 4 anos: R$ 5M-7M+ (orgânico + influenciadores).
      Formalizou empresa em março de 2022 (CNPJ 45.499.372/0001-42, Juiz de Fora/MG).
      Hoje: 376K+ seguidores (@jugomeseu), 50K+ alunos em 20 países.
      [SOURCE: Jornal de Brasília 2023-04-05, Kiwicast #199, #434, #549, cnpj.biz]
    positioning: "Especialista em Conteúdo Viral e Mentora de Vendas — prova viva de que começa do zero funciona"
    era: "2021-presente"

    evolution_timeline:
      - "2015: Conteúdo no Instagram como hobby (moda/beleza, sem resultado)"
      - "Jun/2021: Primeiro passo no digital como afiliada (1.900 seguidores)"
      - "Jul/2021: R$ 1.200 no primeiro mês"
