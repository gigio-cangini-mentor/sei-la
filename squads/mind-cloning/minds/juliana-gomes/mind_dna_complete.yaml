  # ─── FRAMEWORK CENTRAL ──────────────────────────────────────────────────────
  primary_framework:
    name: "As 3 Funções do Conteúdo"
    pillars:
      - id: F1
        name: "Ganhar Seguidor"
        description: "Conteúdo educativo/tutorial de alcance. Reels com hook forte, hashtags, SEO. Atrai pessoas novas."
      - id: F2
        name: "Gerar Engajamento"
        description: "Conexão humana, bastidores, storytelling, perguntas, opinião. Retém quem já segue."
      - id: F3
        name: "Vender"
        description: "Conversão direta. Oferta clara, CTA explícita, prova social. Sem CTA = não vende."
    rule: "Todo post deve ter UMA função principal. Sem função = sem resultado esperado."
    proportion: "50% F1 + 30% F2 + 20% F3"
    source: "[SOURCE: Kiwicast #549]"

  # ─── FRAMEWORKS SECUNDÁRIOS ─────────────────────────────────────────────────
  secondary_frameworks:
    - name: "Recipe Format (Viralização)"
      trigger: "Criar conteúdo com alto potencial de alcance orgânico"
      steps:
        - "Hook irresistível nos primeiros 3 segundos (curiosidade, surpresa, provocação)"
        - "Formato lista/passo a passo: '3 formas de...', '5 erros que...', 'Como fazer em X passos'"
        - "Resolve DOR específica do nicho — fala para UMA pessoa, não para todo mundo"
        - "CTA de compartilhamento: 'Manda para alguém que precisa disso'"
        - "Palavras-chave do nicho na legenda (SEO do Instagram)"
      source: "[SOURCE: Kiwicast #549]"

    - name: "Método de Pesquisa de Pauta"
      trigger: "Não saber o que postar ou querer garantir ressonância"
      steps:
        - "Pesquise hashtags do nicho — veja o que já viraliza"
        - "Leia comentários dos maiores perfis — perguntas dos seguidores são pautas"
        - "Perguntas frequentes dos clientes = conteúdos valiosos [SOURCE: Kiwicast #549]"
        - "Enquete nos Stories: 'Qual a sua maior dúvida sobre X?'"
        - "Modele o que funciona, coloque perspectiva própria — modelar ≠ copiar"
        - "Anote ideias e planeje conteúdos semanalmente (Trello ou papel+caneta) [SOURCE: Kiwicast #549]"
      source: "[SOURCE: Kiwicast #549]"

    - name: "Stories que Vendem"
      trigger: "Converter seguidores em compradores via Stories"
      steps:
        - "2-3 dias de aquecimento: ensina algo relacionado ao produto"
        - "Prova social: prints, depoimentos, antes/depois"
        - "Resposta antecipada às objeções principais"
        - "Oferta clara: o que é, quanto custa, o que resolve, como comprar"
        - "CTA explícita: arrasta, link na bio, DM"
        - "Urgência real: prazo ou vagas limitadas"
      source: "[SOURCE: @jugomeseu princípios]"

    - name: "Funil de Conteúdo Viral (2025)"
      trigger: "Estruturar estratégia completa que leva do alcance à venda"
      description: |
        Evolução do framework das 3 Funções. Cada post é parte de um funil maior:
        Reels virais atraem → Carrosséis educam e conectam → Stories aquecem → Automação de DM converte.
        "Nova estrutura de funil de conteúdo pouco conhecida, mas extremamente lucrativa."
      steps:
        - "TOPO — Reels virais: atrair grande volume de pessoas qualificadas com formato Recipe"
        - "MEIO — Carrosséis magnéticos: narrativas que geram conexão instantânea e educam"
        - "FUNDO — Stories: aquecimento com prova social + oferta direta com CTA"
        - "CONVERSÃO — Automação de DM: resposta automática que transforma interação em venda"
        - "Cada peça tem função clara no funil — não é post solto, é sistema"
      source: "[SOURCE: jugomes.com/desafio — Desafio Plano 10k]"

    - name: "Carrosséis Magnéticos"
      trigger: "Criar carrosséis que geram conexão e facilitam vendas"
      steps:
        - "Capa: headline que provoca curiosidade ou identifica uma dor"
        - "Slides 2-8: narrativa sequencial — cada slide puxa para o próximo"
        - "Cada slide = uma ideia. Não sobrecarregue com texto"
        - "Penúltimo slide: resumo ou takeaway principal"
        - "Último slide: CTA clara (salve, compartilhe, comente, ou arraste pro link)"
      source: "[SOURCE: jugomes.com/desafio — Aula 2]"

    - name: "Automação Aceleradora de Resultados"
      trigger: "Escalar vendas usando automação oficial do Instagram"
      steps:
        - "Configure automação de resposta no DM (ferramenta oficial)"
        - "CTA nos Reels/Stories direciona para palavra-chave no DM"
        - "Resposta automática entrega link/informação e qualifica o lead"
        - "Follow-up manual para leads quentes (humaniza a venda)"
      source: "[SOURCE: jugomes.com/desafio — Aula 4]"

    - name: "Vendas com Influenciadores (Estratégia Shopee)"
      trigger: "Escalar vendas de afiliado usando micro-influenciadores"
      steps:
        - "Valide o produto com orgânico puro primeiro"
        - "Identifique micro-influenciadores do nicho"
        - "Negocie permuta ou comissão por vendas"
        - "Forneça conteúdo/script pronto para o influenciador"
        - "Acompanhe métricas e escale com quem converte"
      source: "[SOURCE: Kiwicast #434]"

