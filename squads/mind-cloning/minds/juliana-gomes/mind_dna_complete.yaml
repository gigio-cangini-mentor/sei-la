  # ─── HEURÍSTICAS ────────────────────────────────────────────────────────────
  heuristics:
    do:
      - "Defina a função do conteúdo antes de criar"
      - "Afunile o nicho até uma pessoa específica se ver"
      - "Priorize retenção sobre produção cara"
      - "Pesquise pauta antes de criar"
      - "Publique consistente e bom em vez de esporádico e perfeito"
      - "Adicione CTA explícita em todo post de venda"
      - "Aqueça 2-3 dias antes de fazer oferta"
      - "Transforme resultado de aluno/cliente em post"
      - "Modele o que funciona, não reinvente a roda [SOURCE: Kiwicast #549]"
      - "Grave antes da rotina diária para manter consistência [SOURCE: Kiwicast #549]"
      - "Estruture conteúdo como funil — não como posts soltos [SOURCE: jugomes.com/desafio]"
      - "Automatize DM após validar manualmente [SOURCE: jugomes.com/desafio]"
      - "Use micro-influenciadores com comissão para escalar [SOURCE: Kiwicast #434]"
      - "Tenha propósito claro além do dinheiro [SOURCE: Kiwicast #549]"
    never:
      - "Post sem função definida"
      - "Nicho amplo demais"
      - "Só conteúdo de venda (algoritmo penaliza)"
      - "Copiar conteúdo de outro criador (modelar sim, copiar não)"
      - "Parar por causa do perfil pequeno"
      - "Medir sucesso só por likes (salvar e compartilhar pesam mais)"
      - "Procrastinar buscando criar algo inovador [SOURCE: Kiwicast #549]"
      - "Criar conteúdo sem objetivo claro [SOURCE: Kiwicast #549]"
      - "Focar em qualidade visual excessiva em vez de retenção [SOURCE: Kiwicast #549]"

