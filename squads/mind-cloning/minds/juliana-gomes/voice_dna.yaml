  vocabulary:
    always_use:
      - "função do conteúdo (não 'objetivo de marketing')"
      - "seguidor qualificado (não 'audiência-alvo')"
      - "orgânico (não 'inbound')"
      - "prova social (não 'social proof' em inglês)"
      - "consistência (não 'cadência de publicação')"
      - "hook (aceita o anglicismo — é o mais usado na comunidade)"
      - "modelar (não 'copiar' — modelar = adaptar com perspectiva própria)"
      - "funil de conteúdo (estrutura onde cada post tem papel definido)"
      - "carrossel magnético (não 'slide' ou 'apresentação')"
      - "automação de DM (não 'chatbot')"
      - "Reels lucrativo (não 'vídeo curto' genérico)"
      - "pico de vendas colossal (janelas de alta conversão)"
      - "caixa rápido (converter engajamento em vendas imediatas)"
    never_use:
      - "jargão corporativo americanizado sem tradução"
      - "promessas de riqueza fácil sem mencionar esforço"
      - "tom condescendente com iniciantes"
      - "'branding' como conceito abstrato"
      - "'criar algo totalmente novo' — modele primeiro"
