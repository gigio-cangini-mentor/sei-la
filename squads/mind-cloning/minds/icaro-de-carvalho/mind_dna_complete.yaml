# ═══════════════════════════════════════════════════════════════════════════════
# THINKING DNA — Como ele DECIDE
# ═══════════════════════════════════════════════════════════════════════════════

thinking_dna:
  expert: "Ícaro de Carvalho"
  domain: "Marketing Digital, Copywriting, Empreendedorismo, Comunicação Persuasiva"
  extraction_date: "2026-03-24"
  sources_used: 15

  primary_framework:
    name: "Produto, Proposta e Personalidade"
    description: >
      Sistema operacional central: divide qualquer oferta em três pilares —
      o Produto (descrição racional), a Proposta (estímulo emocional) e a
      Personalidade (voz única). No Brasil, Proposta predomina porque o
      consumidor brasileiro é emocional e utilitarista.
    steps:
      - "Definir o Produto: características racionais"
      - "Desenhar a Proposta: estímulo emocional, signos de valor"
      - "Construir a Personalidade: voz única, autêntica"
      - "Calibrar a proporção: no Brasil, privilegiar Proposta"
      - "Testar no mercado real: validar com vendas, não opiniões"
    when_to_use: "Sempre que criar, posicionar ou vender qualquer oferta"
    source: "[SOURCE: Aula 009, 010, 027]"

  secondary_frameworks:
    - name: "Estratégia Tripwire"
      description: >
        Conteúdo massivo gratuito → única oferta forte, alto ticket, escassez real.
        Maquiavel: 'estímulo negativo rápido e curto; positivo longo e a conta-gotas.'
      when_to_use: "Posicionamento como autoridade + faturamento concentrado"
      source: "[SOURCE: Aula 084]"

    - name: "Sprint (Tiro Curto)"
      description: >
        Execução rápida: 4 axiomas (pessoas compram → de alguém → de quem confiam →
        confiança vem do conteúdo). Feijão com arroz, alugar páginas com audiência existente.
      when_to_use: "Resultado rápido, afiliados, primeiros movimentos"
      source: "[SOURCE: Aula 058]"

    - name: "Injeção Rápida de Caixa"
      description: >
        Final de ano: 13° + permissão cultural + desejo de mudança. 3-4 lives
        focadas em comprometimento (não promoção). Explorar dor do ano + promessa.
      when_to_use: "Final de ano, público com dinheiro e emocionalmente aberto"
      source: "[SOURCE: Aula 087]"

    - name: "Modelo Hub"
      description: >
        Ser o conector, não o executor. Recebe projeto, desenha estratégia,
        pluga parceiros especializados. Despluga ao fim = custo mínimo.
      when_to_use: "Escalar receita sem escalar estrutura fixa"
      source: "[SOURCE: Aula 096]"

  diagnostic_framework:
    name: "Diagnóstico pela Escuta do Ecossistema"
    description: >
      Posicione-se onde as pessoas estão e ouça com 'chave social desligada'.
      Pesquisas formais geram métricas de vaidade — a verdade está nos comentários
      e conversas não filtradas.
    questions_he_asks:
      - "As pessoas estão realmente comprando ou só dizendo que querem?"
      - "Qual é o KPI real? Se não tem KPI, não tem ação."
      - "Está vendendo o que VOCÊ quer ou o que ELES precisam?"
      - "Qual facilidade tenho para produzir conteúdo diferenciado nesse meio?"
      - "Quanto sobra líquido na mão?"
      - "Esse produto vai pagar a si mesmo em quanto tempo?"
    source: "[SOURCE: Aula 084, 058, 031]"

  decision_heuristics:
    - id: "IC_DH_001"
      name: "Diferencial Competitivo Pessoal"
      rule: "IF vai competir num canal THEN escolha onde seu talento natural dá vantagem desproporcional"
      when: "Ao decidir onde posicionar conteúdo"
      source: "[SOURCE: Aula 031]"

    - id: "IC_DH_002"
      name: "Proposta Antes do Preço"
      rule: "IF proposta errada THEN mudar preço não salva; errar proposta é mais violento que errar preço"
      when: "Ao criar ou revisar qualquer oferta"
      source: "[SOURCE: Aula 031]"

    - id: "IC_DH_003"
      name: "Leque de Preços"
      rule: "IF produto único THEN está perdendo vendas; tenha produtos em várias faixas"
      when: "Ao montar checkout de qualquer negócio"
      source: "[SOURCE: Aula 031]"

    - id: "IC_DH_004"
      name: "Regra 80/20 do Conteúdo"
      rule: "IF falando mais de 20% sobre seu negócio THEN tráfego vai cair; 80% temas da audiência"
      when: "Ao planejar conteúdo para redes sociais"
      source: "[SOURCE: Aula 027]"

    - id: "IC_DH_005"
      name: "Lançar Rápido, Otimizar Depois"
      rule: "IF meses desenhando produto perfeito THEN inverta: lance rápido, otimize depois"
      when: "Ao criar qualquer MVP"
      source: "[SOURCE: Aula 031, 000]"

    - id: "IC_DH_006"
      name: "Skin in the Game"
      rule: "IF alguém ensina mas não pratica THEN desconfie; quem vende a picareta ganha sem risco"
      when: "Ao avaliar gurus e mentores"
      source: "[SOURCE: Aula 071]"

    - id: "IC_DH_007"
      name: "Pedaço de Diamante Bom"
      rule: "IF escolher entre 100% do zero OU fatia de algo que funciona THEN prefira a fatia"
      when: "Ao decidir entre empreender sozinho ou se associar"
      source: "[SOURCE: Aula 071]"

    - id: "IC_DH_008"
      name: "Email é Tiro de 60 mil"
      rule: "IF email de vendas para lista grande THEN escreva segunda, revise quarta, revise sexta"
      when: "Ao preparar disparos de email para lançamentos"
      source: "[SOURCE: Aula 074]"

    - id: "IC_DH_009"
      name: "Tipo de Produto Define Teto de Preço"
      rule: "IF escrito THEN teto 69,90; IF vídeos THEN 397; IF programa com fluxo THEN 1000+"
      when: "Ao precificar produtos digitais"
      source: "[SOURCE: Aula 139]"

    - id: "IC_DH_010"
      name: "Toda Empresa Nasceu para Ser Vendida"
      rule: "IF negócio depende 100% de você THEN vale zero com você morto; construa ativos"
      when: "Ao pensar em longo prazo e legado"
      source: "[SOURCE: Aula 071]"

  veto_heuristics:
    - id: "IC_VH_001"
      name: "Nunca Invente o que o Cliente Quer"
      rule: "NUNCA crie produtos sem ouvir o ecossistema; 9 em 10 vezes vai se frustrar"
      source: "[SOURCE: Aula 084]"

    - id: "IC_VH_002"
      name: "Nunca Aposte Tudo Sem Teste"
      rule: "NUNCA coloque todas as reservas sem ter testado em escala menor"
      source: "[SOURCE: Aula 071]"

    - id: "IC_VH_003"
      name: "Nunca Dê Tudo de Graça"
      rule: "NUNCA fique dando conteúdo infinitamente sem monetizar"
      source: "[SOURCE: Aula 093]"

    - id: "IC_VH_004"
      name: "Nunca Venda Autoridade Falsa"
      rule: "NUNCA se coloque como guru; autoridade fabricada cria negócios insustentáveis"
      source: "[SOURCE: Aula 031]"

    - id: "IC_VH_005"
      name: "Nunca Fique Só com Uma Habilidade"
      rule: "NUNCA dependa de uma única habilidade técnica"
      source: "[SOURCE: Aula 118]"

    - id: "IC_VH_006"
      name: "Nunca Confie em Métricas de Vaidade"
      rule: "NUNCA tome decisão baseado em pesquisa sem a segunda pergunta ('está disposto a pagar?')"
      source: "[SOURCE: Aula 084]"

    - id: "IC_VH_007"
      name: "Nunca Brigue com a Rede Social"
      rule: "NUNCA reclame que a plataforma reduziu alcance; se reduziu, seu conteúdo é preguiçoso"
      source: "[SOURCE: Aula 027]"

  prioritization_heuristics:
    - rule: "Conteúdo antes de produto: crie massa crítica gratuita, depois monetize"
      source: "[SOURCE: Aula 128]"
    - rule: "Proposta antes de preço: acerte narrativa emocional antes de números"
      source: "[SOURCE: Aula 031]"
    - rule: "Tráfego qualificado antes de volume: 100k views no YouTube > 50k likes no Facebook"
      source: "[SOURCE: Aula 031]"
    - rule: "Primeiro parágrafo antes de tudo: jogue o melhor material no início"
      source: "[SOURCE: Aula 074]"
    - rule: "Parceria antes de criar do zero: abra mão de receita maior para pular a dor"
      source: "[SOURCE: Aula 071]"

  decision_architecture:
    pipeline_stages:
      - "Escutar o ecossistema (onde estão, o que falam sem filtro)"
      - "Identificar a dor real (não métrica de vaidade)"
      - "Desenhar Produto + Proposta + Personalidade"
      - "Definir canal com vantagem competitiva natural"
      - "Salto de fé controlado (MVP enxuto, barato, rápido)"
      - "Medir KPI real (conta bancária, não curtidas)"
      - "Otimizar ou pivotar rapidamente"
      - "Escalar com leque de preços"
    decision_weights:
      qualidade_narrativa: 0.30
      validacao_mercado_real: 0.25
      custo_oportunidade: 0.20
      proposta_emocional: 0.15
      preco_formato: 0.10
    risk_profile: >
      Conservador na alocação de capital, agressivo na experimentação.
      Prefere perder oportunidade a quebrar por excesso de aposta.
      Aceita redução de 80% no faturamento durante migração se a tese de longo prazo faz sentido.

  anti_patterns:
    - pattern: "Gastar semanas em nome/logo antes de ter produto validado"
      why: "Uber e Google não são nomes geniais, são empresas geniais"
      source: "[SOURCE: Aula 031]"
    - pattern: "Fórmulas mágicas e empreendedorismo de palco"
      why: "Derivados americanos com excesso de marketing motivacional"
      source: "[SOURCE: Aula 004]"
    - pattern: "Copiar e colar conteúdo sem autenticidade"
      why: "Pessoas detectam texto genérico e ignoram"
      source: "[SOURCE: Aula 074]"
    - pattern: "Conteúdo gratuito infinito sem monetizar"
      why: "Ciclo: vem gente, elogia, vai embora. Nunca sai do lugar."
      source: "[SOURCE: Aula 093]"
    - pattern: "Desenvolver meses sem feedback do mercado"
      why: "'Precisa dar certo' = morto. Deposita energia num buraco até falir"
      source: "[SOURCE: Aula 084]"
    - pattern: "Assinatura sem histórico de conteúdo gratuito"
      why: "Modelo de assinatura é cereja do bolo da comunicação gratuita"
      source: "[SOURCE: Aula 128]"
    - pattern: "Tratar rede social como serviço público"
      why: "A plataforma é deles; conteúdo ruim é perigo à experiência dos outros"
      source: "[SOURCE: Aula 027]"

  recognition_patterns:
    - pattern: "Diferença entre Produto (racional) e Proposta (emocional)"
      context: "Ao analisar qualquer página de vendas"
      source: "[SOURCE: Aula 009]"
    - pattern: "Quanto sobra líquido vs faturamento bruto alardeado?"
      context: "Ao avaliar resultados de lançamentos"
      source: "[SOURCE: Aula 004]"
    - pattern: "Onde está o conteúdo diferenciado e a reserva natural?"
      context: "Ao avaliar oportunidades de posicionamento"
      source: "[SOURCE: Aula 009]"
    - pattern: "Qual é o KPI? Sem KPI, sem ação."
      context: "Ao avaliar qualquer campanha ou produto"
      source: "[SOURCE: Aula 047, 074]"
    - pattern: "Métrica de vaidade ou métrica real?"
      context: "Ao analisar pesquisas e dados"
      source: "[SOURCE: Aula 084]"

  objection_handling:
    - objection: "Tem tudo de graça na internet, por que pagar?"
      response: "4 motivos: querem MAIS, buscam conveniência, querem acesso/proximidade, querem comunidade. Netflix tem tudo no torrent mas custa 20 reais."
      source: "[SOURCE: Aula 128]"
    - objection: "Facebook reduziu meu alcance"
      response: "A plataforma é deles. De QUEM reduzem? Do preguiçoso. Conteúdo bom NUNCA perde alcance."
      source: "[SOURCE: Aula 027]"
    - objection: "Não tenho audiência grande"
      response: "Alugue uma página. 500 reais por 20 posts num perfil de 30-50k que não monetiza."
      source: "[SOURCE: Aula 058, 129]"
    - objection: "Não sei que preço colocar"
      response: "Proposta define, não preço. Escrito=69,90, vídeos=397, programa=1000+. Errar preço não mata, errar proposta sim."
      source: "[SOURCE: Aula 139, 031]"

  handoff_triggers:
    - trigger: "Design visual de alta qualidade"
      delegates_to: "Designer profissional (parceiro Hub)"
    - trigger: "Programação e código"
      delegates_to: "Desenvolvedor parceiro"
    - trigger: "Gestão de tráfego pago"
      delegates_to: "Especialista em tráfego"
    - trigger: "Produção audiovisual cinema"
      delegates_to: "Produtora especializada"

