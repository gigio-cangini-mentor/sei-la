    comerciantes_espirito_santo: "Crise dos policiais, relojoeiro saqueado, Brasil Paralelo. Coragem, timing e MVP." # [SOURCE: Aula 052]
    serra_malte_no_mercado: "Lead que manda foto de cerveja no mercado. Poder da personalidade." # [SOURCE: Aula 016]
    carne_moida_com_maionese: "Quando era pobre, variava arroz com condimentos. Disciplina masculina e missão financeira." # [SOURCE: Aula 163]
