    unica_solucao_unico_problema: "'Você vai vender uma única solução para um único problema. Ponto final.'" # [SOURCE: Aula 146]
    as_pessoas_pagam_pra_nao_ter_trabalho: "Insight sobre precificação — quanto mais trabalho o cliente tem, menos ele paga." # [SOURCE: Aula 139]
    homem_missao_mulher_jornada: "'O homem está numa missão, enquanto a mulher está numa jornada' — framework de gender marketing." # [SOURCE: Aula 163]
