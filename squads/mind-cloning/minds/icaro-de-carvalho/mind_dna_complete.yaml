  metaphors_and_analogies:
    mulher_gravida: "Para explicar viés de atenção (Baader-Meinhof): 'Não é aquela mulher grávida que só porque está grávida só enxerga mulher grávida?'" # [SOURCE: Aula 016]
    sindrome_do_poker: "Analogia completa de poker para explicar sunk cost fallacy — 'pot committed' prende o empreendedor no produto ruim." # [SOURCE: Aula 052]
    furar_com_caneta: "'Usar um telefone para bater num prego' — ferramenta errada funciona, mas gasta energia idiota." # [SOURCE: Aula 066]
    bater_prego_com_faca: "'Dá pra bater um prego com um cabo de faca? Dá, mas o esforço é idiota.' — formato de produto importa na precificação." # [SOURCE: Aula 139]
    academia_tomando_bomba: "'Quando você produz conteúdo sobre uma causa, você está fazendo academia tomando bomba' — causa acelera exponencialmente alcance." # [SOURCE: Aula 085]

  recurring_stories:
