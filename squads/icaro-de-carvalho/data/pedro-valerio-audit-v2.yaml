benchmark:
  note: "Comparação com squads já auditados pelo @pedro-valerio"
  vs_brandcraft_v1_1: |
    Ícaro v2 (82) > BrandCraft v1.1 (71).
    Ícaro tem workflows completos com veto por fase. BrandCraft tem handoff IDs errados.
    Ícaro tem tasks com checkpoint_policy. BrandCraft tem gaps em wf-improve-document.
    Ambos compartilham o problema de enforcement ausente.
  vs_forge_v1: |
    Ícaro v2 (82) > Forge v1.0 (74).
    Forge tem arquitetura de pipeline superior (Flow First Checkpoints, Human Awareness).
    Ícaro tem tasks mais completas (output_example em 3/7, completion_criteria em 7/7).
    Forge tem mais CRITICALs operacionais (state.json, concurrent runs).
  vs_icaro_v1: |
    Ícaro v2 (82) > Ícaro v1 (74). Melhoria de +8 pontos.
    Workflows existem agora (antes eram fantasma). Checkpoints formais em todas as fases.
    3 novas tasks são as melhores do squad (campanha-trafego, estrategia-social, branding-completo = 10/10).
    Checklists são novidade e estão bem estruturados.

# ═══════════════════════════════════════════════════════════════════════════════
# HIGHLIGHTS — O QUE ESTÁ EXCEPCIONAL
# ═══════════════════════════════════════════════════════════════════════════════

highlights:
  - title: "3 tasks modelo (10/10)"
    detail: |
      campanha-trafego, estrategia-social e branding-completo são as tasks mais completas
      já auditadas em qualquer squad. Têm TUDO: elicitação, output_example detalhado,
      completion_criteria, veto conditions com citação de framework, múltiplos checkpoints,
      e tom de voz do mind preservado nos vetos.

  - title: "Voice DNA excepcional nos veto conditions"
    detail: |
      Os veto conditions não são genéricos — falam na voz do mind:
      - Kiso: "Estratégia sem métrica é horóscopo de marketing."
      - Hiller: "Copiar líder é construir a marca dele de graça."
      - Sobral: "Sem pixel não existe campanha. Instala primeiro, depois a gente conversa."
      Isso não é common — é diferenciador.

  - title: "Checklists com scoring system"
    detail: |
      Ambos checklists têm scoring com pesos, thresholds (PASS/REVISÃO/FAIL e GO/GO ressalvas/NO-GO)
      e bloqueadores absolutos separados. Padrão superior ao de squads anteriores.

  - title: "Multi-mind orchestration nos workflows"
    detail: |
      wf-marketing-end-to-end é o workflow mais ambicioso auditado — orquestra 5 minds
      em 6 fases com handoffs explícitos. Nenhum outro squad tentou isso.

