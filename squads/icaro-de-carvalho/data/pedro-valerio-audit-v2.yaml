# WORKFLOWS
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  wf-lancamento-completo:
    file: "workflows/wf-lancamento-completo.yaml"
    phases: 6
    unidirectional: true
    checkpoints: 6
    veto_conditions: 18
    handoff_gaps: 0
    human_review_flags: 6
    score: 8
    strengths:
      - "6 fases com fluxo perfeitamente linear: PHASE-0 → 1 → 2 → 3 → 4 → 5"
      - "TODOS os checkpoints têm human_review: true + ask_user com template de comunicação"
      - "Veto conditions por fase com ação clara (BLOCK vs WARN)"
      - "handoff_to explícito entre fases"
      - "Inputs com required/optional bem definidos + examples"
      - "Completion signals com success/partial/failure — graceful degradation"
      - "Outputs com paths documentados por slug"
      - "agents_by_phase serve como mapa rápido de responsabilidade"
    issues:
      - severity: HIGH
        id: "WF1-H1"
        title: "Veto conditions sem enforcement mecânico"
        detail: |
          Todas as 18 veto conditions são textuais ("→ BLOCK", "→ WARN") mas não existe
          mecanismo que FORCE o bloqueio. O executor pode ler "BLOCK" e decidir ignorar.
          Sem blocking: true ou throw, o "BLOCK" é uma sugestão, não uma trava.
        wrong_path: "Executor ignora BLOCK e avança para próxima fase com output incompleto"
        recommendation: "Adicionar enforcement: { checkpoint_policy: block_on_veto, veto_behavior: halt }"

      - severity: MEDIUM
        id: "WF1-M1"
        title: "WARN sem threshold de promoção para BLOCK"
        detail: |
          Phase 0 tem "Personalidade completamente ausente → WARN" — mas e se chegar no Phase 3
          (Copy) sem personalidade? O WARN nunca vira BLOCK em fases posteriores.
          Acumular WARNs sem escalar é ignorar risco que cresce.
        wrong_path: "Produto lança com personalidade ausente porque ninguém escalou o WARN"
        recommendation: "Definir regra: WARN no Phase 0 → BLOCK se não resolvido até Phase 2"

      - severity: MEDIUM
        id: "WF1-M2"
        title: "Sem timeout/max_duration global"
        detail: |
          Duration "3-6 semanas" sem enforcement. Se o workflow travar no Phase 2
          (conteúdo orgânico), nenhum mecanismo detecta estagnação.
        wrong_path: "Workflow fica parado no Phase 2 por 3 meses sem ninguém perceber"
        recommendation: "Adicionar max_duration: 6w com alerta em 80% do tempo (4.8 semanas)"

      - severity: LOW
        id: "WF1-L1"
        title: "not_for menciona 'wf-sprint' que não existe"
        detail: |
          Campo not_for diz: "Lançamentos urgentes em menos de 1 semana (use wf-sprint)".
          Não existe wf-sprint no disco. Referência a workflow fantasma.
        wrong_path: "Usuário procura wf-sprint e não encontra"
        recommendation: "Remover referência ou criar wf-sprint"

  wf-copy-pipeline:
    file: "workflows/wf-copy-pipeline.yaml"
    phases: 4
    unidirectional: true
    checkpoints: 4
    veto_conditions: 14
    handoff_gaps: 0
    human_review_flags: 4
    score: 9
    strengths:
      - "Workflow mais limpo e robusto do squad"
      - "4 fases claras: Diagnóstico → Tom de Voz → Redação → Revisão/Adaptação"
      - "Multi-agent por design: Ícaro redige, Hiller posiciona, Juliana adapta orgânico, Sobral adapta ads"
      - "Inputs com required + optional + examples + valores enumerados"
      - "Cada checkpoint tem criteria, veto_conditions, output e ask_user"
      - "Completion signals com 3 níveis (success/partial/failure)"
      - "Quick reference com framework por tipo de copy"
      - "Copy condicional por tipo (when: tipo_de_copy inclui X)"
      - "Revisão final pelo Ícaro garante coerência entre canais"
    issues:
      - severity: HIGH
        id: "WF2-H1"
        title: "Veto conditions sem enforcement mecânico"
        detail: "Mesmo problema do WF1-H1. 14 veto conditions textuais sem blocking: true."
        wrong_path: "Executor ignora BLOCK e entrega copy com jargão corporativo"
        recommendation: "Adicionar enforcement global"

      - severity: MEDIUM
        id: "WF2-M1"
        title: "Condicional 'when' sem fallback para tipos não cobertos"
        detail: |
          Tasks da Phase 2 usam "when: tipo_de_copy inclui 'email'" etc. Se o usuário pedir
          um tipo de copy não listado (ex: "roteiro de webinar"), nenhuma task é ativada e
          o workflow não tem fallback para tipos desconhecidos.
        wrong_path: "Usuário pede 'copy de webinar' e Phase 2 não gera nada, passa vazio para Phase 3"
        recommendation: "Adicionar fallback task para tipo_de_copy não reconhecido, ou veto 'tipo inválido → BLOCK'"

      - severity: LOW
        id: "WF2-L1"
        title: "not_for referencia wf-lancamento-completo mas sem link ou path"
        detail: "Diz 'use wf-lancamento-completo' sem path. Funcional mas inconsistente."
        recommendation: "Adicionar path relativo ou absoluto"

  wf-marketing-end-to-end:
    file: "workflows/wf-marketing-end-to-end.yaml"
    phases: 6
    unidirectional: true
    checkpoints: 6
    veto_conditions: 15
    handoff_gaps: 0
    human_review_flags: 6
    score: 8
    strengths:
      - "Workflow mais ambicioso — orquestra TODOS os 5 minds em sequência"
      - "6 fases com handoff_from/handoff_to explícitos em TODAS"
      - "Phase 3 com trabalho paralelo (Juliana orgânico + Ícaro copy) — único workflow com paralelismo"
      - "Inputs com restricoes como campo opcional (diferenciado)"
      - "Veto conditions fortes e específicas por fase"
      - "Cada fase tem description rica com premissas e contexto"
    issues:
      - severity: HIGH
        id: "WF3-H1"
        title: "Veto conditions sem enforcement mecânico"
        detail: "Mesmo problema sistêmico. 15 veto conditions textuais sem mecanismo de halt."
        wrong_path: "Executor avança sem análise de concorrência porque BLOCK é só texto"
        recommendation: "Enforcement global"

      - severity: HIGH
        id: "WF3-H2"
        title: "Phase 3 paralela sem sincronização explícita"
        detail: |
          Phase 3 roda @juliana-gomes e @icaro-de-carvalho em paralelo, mas não define:
          - Quem termina primeiro?
          - O checkpoint QG-3 espera AMBOS ou qualquer um?
          - Se Juliana termina e Ícaro trava, há timeout?
          O workflow não tem sync barrier — o checkpoint pode ser atingido com output parcial.
        wrong_path: "QG-3 aprovado com calendário editorial mas sem copy de vendas (ou vice-versa)"
        recommendation: "Adicionar sync_barrier: all antes do checkpoint, ou criteria explícito que valide ambos outputs"

      - severity: MEDIUM
        id: "WF3-M1"
        title: "Sem timeout/max_duration global"
        detail: "Duration '4-8 semanas' sem enforcement de prazo máximo."
        wrong_path: "Workflow estagna por meses sem detecção"
        recommendation: "Adicionar max_duration com alerta"

      - severity: LOW
        id: "WF3-L1"
        title: "Phase 4 e 5 lidas do restante do arquivo mas sem checkpoint visível no trecho lido"
        detail: |
          O arquivo excedeu o limite de leitura, mas pela estrutura dos outros workflows,
          é provável que Phase 4 e 5 sigam o mesmo padrão. Verificar se existem checkpoints.
        recommendation: "Confirmar presença de QG-4 e QG-5 no arquivo completo"

