overlap_analysis:
  summary: |
    O squad icaro-de-carvalho v2.0 expandiu de 2 para 6 agentes absorvendo domínios
    que já existem parcialmente em outros squads. A estratégia "Multi-Mind" centraliza
    marketing digital em um único squad, o que reduz fragmentação mas cria sobreposição
    com leandro-ladeira (tráfego) e copywriting-squad (copy).

  risk_matrix:
    - risk: "Usuário confuso entre pedro-sobral (icaro squad) e leandro-ladeira"
      severity: MEDIUM
      mitigation: "Adicionar seção 'Quando usar este squad vs leandro-ladeira' no README"

    - risk: "Task copy-email existe em ambos icaro-de-carvalho e leandro-ladeira"
      severity: HIGH
      mitigation: "Diferenciar explicitamente: icaro = estilo Novo Mercado; leandro = perpétuo/VTSD"

    - risk: "Juliana Gomes (conteúdo orgânico) é nome real — pode gerar confusão jurídica"
      severity: LOW
      mitigation: "Confirmar uso educacional e disclaimers adequados no agente"

  positive_differentiation:
    - "icaro-de-carvalho tem extração REAL (85-90% fidelidade) vs agentes YOLO dos concorrentes"
    - "Frameworks proprietários únicos: PPP, Tripwire, Sprint, Teto por Formato, Modelo Hub"
    - "Contexto brasileiro nativo — diferencial vs copywriting-squad internacional"
    - "Squad v2.0 multi-mind é o mais abrangente do ecossistema para marketing digital BR"

