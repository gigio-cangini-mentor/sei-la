    - id: REC-001
      title: "Criar workflows declarados no config.yaml"
      description: |
        config.yaml declara wf-lancamento-completo.yaml e wf-copy-pipeline.yaml
        mas os arquivos não existem. Squad não pode executar workflows prometidos.
      action: "Criar workflows/wf-lancamento-completo.yaml e workflows/wf-copy-pipeline.yaml"
      effort: MEDIUM

    - id: REC-002
      title: "Corrigir inconsistência de versão no config.yaml"
      description: "Comentário do topo diz v1.0.0 mas pack-metadata é v2.0.0."
      action: "Remover linha '# Version: 1.0.0' do topo do config.yaml"
      effort: LOW

  priority_high:
    - id: REC-003
      title: "Atualizar tabela de Agents no README.md"
      description: |
        README lista apenas 2 agentes mas squad tem 6. Os 4 novos (pedro-sobral,
        rafael-kiso, marcos-hiller, juliana-gomes) não aparecem na documentação.
      action: "Expandir seção 'Agents' no README para incluir todos os 6 agentes"
      effort: LOW

    - id: REC-004
      title: "Adicionar seção de diferenciação vs leandro-ladeira no README"
      description: |
        Overlap de tráfego pago e copy-email com leandro-ladeira squad. Usuário
        precisa de orientação clara sobre quando usar cada squad.
      action: |
        Adicionar seção '## Quando usar este squad vs leandro-ladeira' com:
        - icaro squad = lançamento, tripwire, copy de produto novo, storytelling
        - leandro-ladeira = tráfego perpétuo, venda todo santo dia, ROAS/CPC otimização
      effort: LOW

  priority_medium:
    - id: REC-005
      title: "Criar ao menos 1 checklist e 1 template"
      description: |
        Diretórios checklists/ e templates/ estão vazios. Squad de lançamento/copy
        sem templates de output é gap significativo de usabilidade.
      action: |
        Criar: checklists/checklist-lancamento.md e templates/email-vendas-tmpl.md
        como ponto de partida. Pode ser gerado com base nos frameworks já documentados.
      effort: MEDIUM

    - id: REC-006
      title: "Documentar fidelidade real dos agentes YOLO no config.yaml"
      description: |
        4 agentes com mind_source "web-research (YOLO mode)" têm fidelidade 60-75%.
        O padrão do ecossistema (leandro-ladeira) referencia paths canônicos de mind_dna.
      action: |
        Criar diretórios em squads/mind-cloning/minds/ para pedro-sobral, rafael-kiso,
        marcos-hiller, juliana-gomes com pelo menos um sources_inventory.yaml básico.
        Ou adicionar disclaimer explícito de fidelidade baixa nesses agentes.
      effort: HIGH

  priority_low:
    - id: REC-007
      title: "Adicionar 'Próximos Passos' ao config.yaml como campo backlog"
      description: "README tem backlog pendente mas config.yaml não reflete o estado de completude."
      action: "Adicionar campo 'status: beta' ou 'completion: 65%' no pack-metadata"
      effort: LOW

