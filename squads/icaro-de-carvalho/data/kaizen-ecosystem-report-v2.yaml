  # DIMENSÃO 2: COERÊNCIA (9/10)
  # ═══════════════════════════════════════════════════════════════════════════════

  coerencia:
    score: 9
    details: |
      Os 5 minds se complementam com sobreposição mínima e handoffs claros.
      Workflows usam os agents corretos nas fases corretas. Heurísticas são
      consistentes entre agents — sem contradições.

    agent_complementarity:
      status: EXCELLENT
      details: |
        Cada agent ocupa um território claro e distinto:
        - Ícaro: copy, lançamento, storytelling, precificação (core strategy)
        - Sobral: tráfego pago, criativos, escala de campanhas (execução paga)
        - Kiso: analytics, social strategy, dados, KPIs (medição e planejamento)
        - Hiller: branding, posicionamento, naming (identidade de marca)
        - Juliana: conteúdo orgânico, Instagram, crescimento sem ads (execução orgânica)
        O orchestrator (icaro-chief) tem routing table bem definida com triggers por keyword.

    handoffs:
      status: GOOD
      details: |
        Handoffs claros nos workflows:
        - wf-copy-pipeline: Ícaro (diagnóstico) → Hiller (posicionamento) → Ícaro (redação) → Juliana+Sobral (revisão por canal)
        - wf-lancamento-completo: Ícaro (PPP) → Hiller (branding) → Kiso (estratégia) → Juliana (orgânico) → Sobral (tráfego) → Kiso (analytics)
        - wf-marketing-end-to-end: orquestra todos os 5 minds em 6 phases sequenciais
      nota: |
        Handoff_to no icaro-de-carvalho.md ainda menciona "designer ou visual (parceiro Hub)"
        e "tráfego pago (especialista)" em vez de referenciar @pedro-sobral e @marcos-hiller
        diretamente. Inconsistência menor — os agents existem no squad.

    heuristics_consistency:
      status: PASS
      details: |
        Heurísticas são complementares, não contraditórias:
        - Ícaro diz "Proposta mata preço" → Hiller diz "Posicionar é renunciar" → consistente
        - Sobral diz "Criativo é rei (85%)" → Ícaro diz "Conteúdo é moeda" → complementar
        - Kiso diz "Sem KPI, sem estratégia" → Sobral diz "CPA máximo antes de rodar" → alinhados
        - Juliana diz "Função antes do formato" → Ícaro diz "Framework primeiro" → consistente
        Nenhuma contradição detectada entre os 5 conjuntos de heurísticas.

    templates_usage:
      status: GOOD
      details: |
        Templates são referenciados nos workflows corretos:
        - email-vendas-tmpl.md → usado no wf-copy-pipeline (Phase 2, copy-email)
        - landing-page-tmpl.md → usado no wf-copy-pipeline (Phase 2, copy-pagina-de-vendas)
        - anuncio-criativo-tmpl.md → usado no wf-copy-pipeline (Phase 2+3, copy-anuncio + revisão Sobral)
        Templates integram frameworks de múltiplos agents (Ícaro PPP + Sobral Gancho + Juliana 3 Funções).

