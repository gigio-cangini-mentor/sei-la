      status: EXCELLENT
      details: |
        Os 3 workflows são os mais detalhados do ecossistema:
        - wf-copy-pipeline: 4 phases, 644 linhas. Cada task tem action com instruções
          passo-a-passo. Checkpoints com veto_conditions específicas e ask_user.
