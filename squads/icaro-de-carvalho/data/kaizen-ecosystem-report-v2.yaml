  issues:
    critical: []

    medium:
      - id: ISS-001
        title: "README tree desatualizada"
        details: |
          A seção 'Estrutura' no README.md lista apenas 4 tasks (diagnostico-ppp, copy-email,
          lancamento-strategy, precificacao) e 2 workflows. Na realidade são 7 tasks, 3 workflows,
          2 checklists e 3 templates. Checklists/ aparece vazio na tree.
        recommendation: "Atualizar a tree no README para refletir o estado real do squad."

      - id: ISS-002
        title: "Juliana Gomes sem task no config.yaml"
        details: |
          Juliana Gomes tem 10 commands definidos no agent e é usada nos workflows
          (Phase 3 do wf-copy-pipeline, Phase 3 do wf-lancamento-completo) mas NÃO tem
          nenhuma task standalone registrada no config.yaml. Os outros 4 agents primários
          têm pelo menos 1 task cada.
        recommendation: |
          Criar ao menos 1 task para juliana-gomes (ex: conteudo-organico.md ou
          calendario-editorial.md) e registrar no config.yaml.

      - id: ISS-003
        title: "Handoffs genéricos no agent icaro-de-carvalho.md"
        details: |
          A seção handoff_to do icaro-de-carvalho.md menciona "designer ou visual (parceiro Hub)",
          "tráfego pago (especialista)" e "desenvolvedor (parceiro Hub)" em vez de referenciar
          os agents do próprio squad (@pedro-sobral, @marcos-hiller).
        recommendation: "Atualizar handoff_to para referenciar os agents do squad."

      - id: ISS-004
        title: "Config.yaml não declara checklists e templates"
        details: |
          A seção formal do config.yaml lista agents, tasks e workflows mas não tem
          seção para checklists nem templates. Os arquivos existem mas não estão
          inventariados no config.
        recommendation: "Adicionar seções 'checklists:' e 'templates:' no config.yaml."

    low:
      - id: ISS-005
        title: "Pedro Sobral e Rafael Kiso com mind_dna incompleto"
        details: |
          Estes 2 minds têm diretório canônico mas sem voice_dna.yaml e
          sources_inventory.yaml separados (apenas mind_dna_complete.yaml + sources/).
          Os outros 3 minds têm extração mais completa.
        recommendation: "Gerar voice_dna.yaml e sources_inventory.yaml para Sobral e Kiso quando possível."

      - id: ISS-006
        title: "Tasks sem human_review nos checkpoints"
        details: |
          Todas as 7 tasks usam auto_check nos checkpoints. Para um squad consultivo
          onde outputs são copy e estratégia, seria mais seguro ter human_review: true
          no checkpoint final.
        recommendation: "Adicionar human_review: true no último checkpoint de cada task."

      - id: ISS-007
        title: "Agents secundários sem output_examples no corpo do agent"
        details: |
          pedro-sobral.md, rafael-kiso.md, marcos-hiller.md e juliana-gomes.md não têm
          seção output_examples no arquivo do agent (têm apenas nas tasks). icaro-de-carvalho.md
          e icaro-chief.md têm output_examples excelentes.
        recommendation: "Adicionar 2-3 output_examples por agent para consistência."

