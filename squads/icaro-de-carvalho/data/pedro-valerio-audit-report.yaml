  max: 80
  percentage: 74
  verdict: "APROVAR COM RESSALVAS"
  # 90-100: APROVAR | 70-89: APROVAR c/ ressalvas | 50-69: VETO | <50: retrabalho

criteria_scores:
  veto_conditions: 7       # Tasks têm veto, mas orchestrator e agents não
  fluxo_unidirecional: 8   # Routing table clara, sem loops
  checkpoints: 4           # Zero checkpoints formais entre fases
