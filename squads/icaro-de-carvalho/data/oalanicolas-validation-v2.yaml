          Expressividades, Referências Globais. 17 heurísticas com formato IF/THEN
          e muitas com [SOURCE:] específico.

      anti_patterns_analysis:
        count: 5
        specificity: "Alta — todos refletem posições reconhecíveis do Hiller"
        best: "'NUNCA reduzir branding a design gráfico' — assinatura pedagógica dele"
        weakest: "'NUNCA tratar cases internacionais como universais' — legítimo mas menos identitário"

      contradictions_preserved: 5
      contradictions_quality: |
        Boas e reveladoras. "Acadêmico mas hands-on" e "Brasileiro mas global"
        capturam tensões reais. "Professor mas consultor" é particularmente boa
        — reflete a dualidade ESPM + The Hiller and Branding.

      output_examples_count: 2
      output_examples_quality: |
        Muito bons. O diagnóstico de academia aplica Os 7 Elementos + Roadmap de
        Relevância com naturalidade. O de legaltech B2B aplica os 5 Passos de
        Posicionamento com profundidade. Ambos terminam com frases-âncora do Hiller.

      gaps:
        - "2/18 signature phrases sem [SOURCE:] ('Sem pesquisa, sem marca' e uma segunda)"
        - "Falta episodic memories (cases de clientes como Ambev/Bayer, fundação dos BrandThinkers, pesquisa em Erasmus)"
        - "Sem vocabulary fingerprints quantificados"
        - "Veto heuristics (14) sobrepõem-se com anti_patterns (5) — poderiam ser consolidados"

      strengths:
        - "89% de rastreabilidade — muito acima da média do squad"
        - "Vocabulário técnico proprietário forte com distinções precisas (construção vs criação, relevância vs awareness)"
        - "Immune system com 9 triggers — todos com respostas comportamentalmente corretas"
        - "Cases como ferramenta didática (Apple, Nike, Coca-Cola, Nespresso, Guaraná Jesus)"
        - "Frameworks com 'when' claros — o agente sabe quando usar cada um"

    # ─────────────────────────────────────────────────────────────────────────────
    juliana-gomes:
      fidelity_score: 8.5
      voice_dna_score: 8.5
      thinking_dna_score: 8.3
      source_coverage: "~80% das claims com [SOURCE:] rastreável"

      voice_dna_analysis:
        signature_phrases_count: 17
        with_source_tag: 17
        without_source_tag: 0
        assessment: |
          100% de rastreabilidade — padrão excelente. Fontes específicas (Kiwicast #549,
          Kiwicast #434, Kiwicast #199, Jornal de Brasília, jugomes.com). As frases
          capturam o tom acolhedor-prático ("Eu comecei com 1.900 seguidores",
          "Quem não oferece não vende", "Não faça para ver se vai dar certo, faça
          até dar certo"). O background pessoal é excepcionalmente detalhado
          (auxiliar de enfermagem, R$950/mês, cestas básicas da igreja). Vocabulário
          always_use com 14 termos proprietários (funil de conteúdo, carrossel
          magnético, Reels lucrativo, pico de vendas colossal, caixa rápido).

      thinking_dna_analysis:
        frameworks_count: 9
        heuristics_count: 17
        heuristics_with_when: 15
        assessment: |
          Sólido. "As 3 Funções do Conteúdo" como primário é correto e bem
          documentado. Secundários cobrem: Viralização Recipe, Calendário Semanal,
          Pesquisa de Conteúdo, Stories que Vendem, Hashtag, Funil Viral 2025,
          Carrosséis Magnéticos, MSV 7 Passos, Automação, Influenciadores Shopee.
          Os 7 passos do MSV são corretamente marcados como proprietários (sem
          revelar o conteúdo pago). 17 heurísticas — volume forte.

      anti_patterns_analysis:
        count: 6
        specificity: "Alta — refletem a experiência orgânica-first dela"
        best: "'NUNCA use tom de guru inacessível — ela é a gente que deu certo'"
        weakest: "'NUNCA copie conteúdo de outro criador' — genérico mas contextualizado com 'adapte e coloque sua perspectiva'"

      contradictions_preserved: 4
      contradictions_quality: |
        Boas mas poucas. "Simples mas estratégica" e "Humilde mas segura" capturam
        a dualidade real. Poderia ter mais (ex: "orgânico-only mas fatura milhões",
        "anti-investimento mas construiu patrimônio", "comunidade Wakanda / representatividade
        negra como diferencial num mercado dominado por outra demografia").

      output_examples_count: 3
      output_examples_quality: |
        Excelentes e concretos. O de nutricionista aplica as 3 Funções com 5 ideias
        reais. O Reels de finanças tem script completo com timing por segundo.
        O de marmitas com 800 seguidores é diagnóstico + plano de ação — reflete
        o tom "você pode sim" dela.

      gaps:
        - "Contradições poderiam ser mais numerosas e reveladoras (4 é pouco para um perfil tão rico)"
        - "Falta explorar a tensão 'orgânico puro → uso de influenciadores pagos' como evolução"
        - "MSV 7 Passos marcado como proprietário — correto, mas sem nem sequer uma dica dos princípios públicos reduz utilidade"
        - "Timeline de evolução é excelente no background mas não é usada nos frameworks (falta framework de 'estágios de maturidade do criador')"
        - "Sem vocabulary fingerprints quantificados"

      strengths:
        - "100% de signature phrases com [SOURCE:] — empata com Pedro Sobral como melhor do squad"
        - "Background pessoal excepcionalmente detalhado — permite respostas empáticas autênticas"
        - "Immune system com 12 triggers — volume forte com respostas in-character"
        - "Produtos e multi-plataforma documentados — contexto de negócio completo"
        - "Output examples são os mais 'acionáveis' do squad — scripts prontos para usar"
        - "Evolution timeline dá contexto temporal para cada framework"

    # ─────────────────────────────────────────────────────────────────────────────
    icaro-chief:
      fidelity_score: 7.5
      voice_dna_score: 6.0
      thinking_dna_score: 7.5
      source_coverage: "N/A — orchestrator, não mind clone"

      assessment: |
        O icaro-chief é um ORCHESTRATOR, não um mind clone. Deve ser avaliado como
        router/coordinator, não como DNA extraction. Nessa função, ele cumpre bem:
        - Routing table com 5 agents e triggers por palavras-chave
        - 17 commands mapeados para agents específicos
        - 2 workflows documentados (lançamento completo, copy completa)
        - 3 output examples que demonstram diagnóstico + routing
        O vocabulário usa termos do Ícaro (PPP, causa, ecossistema) sem ser o Ícaro
        — tom correto para orchestrator.

      gaps:
        - "Falta workflow multi-agent (ex: diagnóstico Ícaro → tráfego Sobral → branding Hiller)"
        - "Falta fallback/escalation — o que acontece se nenhum trigger combina?"
        - "Sem referência cruzada entre agents (ex: quando Sobral deve pedir input do Kiso)"
        - "Voice DNA é minimal — tudo bem para orchestrator, mas poderia ter 2-3 frases do Ícaro como 'boas-vindas'"

      strengths:
        - "Routing table cobre 100% dos agents do squad"
        - "Commands são claros com arrows indicando destino (→ @agent)"
        - "Output examples demonstram diagnóstico-antes-de-ação corretamente"
        - "Tom neutro mas informado — não tenta ser nenhum expert"

  # ═══════════════════════════════════════════════════════════════════════════════
  # OVERALL ASSESSMENT
  # ═══════════════════════════════════════════════════════════════════════════════

  overall:
    average_fidelity: 8.4
    top_agent: "pedro-sobral (9.0) — melhor rastreabilidade, maior riqueza de frameworks, vocabulário de comunidade"
    second_best: "marcos-hiller (8.8) — excelente rastreabilidade, vocabulário técnico preciso, contradições reveladoras"
    weakest_agent: "icaro-chief (7.5) — mas é orchestrator, não mind clone — a comparação é injusta"
    weakest_mind_clone: "rafael-kiso (8.3) — fontes genéricas demais, contradições superficiais"

    # Ranking por dimensão
    rankings:
      voice_dna: ["pedro-sobral (9.2)", "marcos-hiller (9.0)", "juliana-gomes (8.5)", "icaro-de-carvalho (8.0)", "rafael-kiso (8.0)"]
      thinking_dna: ["pedro-sobral (9.0)", "icaro-de-carvalho (9.0)", "marcos-hiller (8.7)", "rafael-kiso (8.5)", "juliana-gomes (8.3)"]
      source_traceability: ["pedro-sobral (~85%)", "juliana-gomes (~80%)", "marcos-hiller (~80%)", "rafael-kiso (~75%)", "icaro-de-carvalho (~65%)"]
      output_examples: ["juliana-gomes", "pedro-sobral", "icaro-de-carvalho", "marcos-hiller", "rafael-kiso"]

    critical_issues:
      - issue: "Nenhum agent tem episodic memories formalizadas"
        severity: "ALTA"
        impact: |
          Histórias pessoais dos experts (Ícaro perdendo conta do Instagram, Sobral como
          garçom, Juliana recebendo cesta básica, Hiller no Erasmus, Kiso fundando mLabs)
          são os maiores ativos de credibilidade e estão apenas no background — não como
          memórias episódicas acessáveis para storytelling em output.
        fix: "Adicionar seção 'episodic_memories' em cada agent com 5-10 histórias indexadas por tema"

      - issue: "Nenhum agent tem vocabulary fingerprints quantificados"
        severity: "MÉDIA"
        impact: |
          Sem contagem de frequência real das palavras-chave, o agente pode sub ou
          super-utilizar termos identitários. O Ícaro diz 'personalidade' 200x mas
          o agent não sabe disso.
        fix: "Processar fontes e adicionar contagens (ex: 'proposta': 185x, 'personalidade': 203x, 'causa': 97x)"

      - issue: "Ícaro de Carvalho tem a PIOR rastreabilidade do squad (~65%)"
        severity: "ALTA"
        impact: |
          Paradoxalmente, o expert principal do squad tem a menor cobertura de [SOURCE:].
          7/12 signature phrases sem fonte. Isso é preocupante porque ele deveria ser
          o clone de MAIOR fidelidade.
        fix: "Revisitar as 7 frases sem [SOURCE:] e rastrear nas transcrições/livro. Se não rastreáveis, marcar como [ATTRIBUTION: provável, não verificado]"

      - issue: "Rafael Kiso com fontes genéricas"
        severity: "MÉDIA"
        impact: |
          Muitas claims marcadas como '[SOURCE: web]' ou '[SOURCE: web-research]' —
          impossível verificar. Livro Unbound Marketing existe como fonte Tier 0
          mas parece sub-explorado.
        fix: "Reprocessar source unbound-marketing-book.md e substituir [SOURCE: web] por citações de página/capítulo do livro"

    recommendations:
      - priority: "P0 — CRÍTICO"
        action: "Adicionar episodic_memories em todos os 5 mind clones"
        rationale: |
          Episodic memories são o que diferencia um clone FUNCIONAL de um clone
          VIVIDO. Sem elas, os agents respondem com frameworks mas não contam
          histórias — e storytelling é a arma principal de todos esses 5 experts.

      - priority: "P0 — CRÍTICO"
        action: "Corrigir rastreabilidade do agent icaro-de-carvalho"
        rationale: |
          O agent principal não pode ter a pior rastreabilidade do squad.
          Revisar as 7 frases sem [SOURCE:] contra o mind_dna_complete.yaml
          e as transcrições em squads/mind-cloning/minds/icaro-de-carvalho/sources/.

      - priority: "P1 — IMPORTANTE"
        action: "Substituir [SOURCE: web] do Rafael Kiso por citações específicas"
        rationale: |
          O livro Unbound Marketing está disponível como fonte. As claims genéricas
          podem ser rastreadas até capítulos específicos.

      - priority: "P1 — IMPORTANTE"
        action: "Adicionar vocabulary fingerprints quantificados em cada agent"
        rationale: |
          A frequência das palavras-chave calibra o uso natural dos termos.
          Sem isso, o agente pode usar "personalidade" 1x quando o Ícaro real
          usaria 10x na mesma conversa.

      - priority: "P2 — DESEJÁVEL"
        action: "Expandir contradictions da Juliana Gomes de 4 para 7-8"
        rationale: |
          Ela tem contradições ricas não exploradas (orgânico-only → influenciadores,
          representatividade Wakanda, enfermeira → multimilionária). As 4 atuais são
          boas mas insuficientes para a riqueza da persona.

      - priority: "P2 — DESEJÁVEL"
