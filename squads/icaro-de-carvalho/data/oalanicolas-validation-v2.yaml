          Vocabulário always_use com 14 termos (incluindo termos novos: "estrutura
          mental", "disponibilidade mental", "densidade conceitual", "consumidor
          extremo") — todos com [SOURCE:].

      thinking_dna_analysis:
        frameworks_count: 10
        heuristics_count: 17
        heuristics_with_when: 17
        assessment: |
          Rico e específico. Roadmap de Relevância em 4 Etapas como primário é
          correto. Os secundários cobrem: 7 Elementos de Marca, 5 Passos de
          Posicionamento, Formação de Estrategistas, ONdivíduos, Marca como Estrutura
