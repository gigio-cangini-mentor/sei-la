# RECOMENDAÇÕES ESTRATÉGICAS
# ═══════════════════════════════════════════════════════════════════════════════

strategic_recommendations:
  priority_1_critical:
    title: "Elevar Pedro Sobral com transcrição de lives"
    effort: "alto (15-20 lives = ~15h de áudio)"
    impact: "72% → 88%+"
    why: |
      Sobral é o complemento natural do Ícaro (tráfego pago vs. comunicação).
      Com 266+ lives públicas no YouTube, o material Tier 1 está disponível
      e gratuito. É o maior ROI de esforço do squad inteiro.

  priority_2_high:
    title: "Ler livro Unbound Marketing do Kiso"
    effort: "médio (240 páginas)"
    impact: "68% → 82%+"
    why: |
      Kiso sem o livro é analista genérico com nome famoso. COM o livro,
      a metodologia Unbound se torna genuína e as frases se tornam verificáveis.

  priority_3_high:
    title: "Ler livro de Branding (2019) do Hiller"
    effort: "médio (~200 páginas estimadas)"
    impact: "70% → 83%+"
    why: |
      O Roadmap de Relevância pode estar incompleto/incorreto sem o livro.
      Com 5 livros publicados, Hiller é um autor — seus livros SÃO ele.

  priority_4_medium:
    title: "Expandir corpus Juliana Gomes com Reels"
    effort: "baixo-médio (transcrever 15 Reels)"
    impact: "73% → 82%+"
    why: |
      Já é a melhor web-based. Com mais corpus do Instagram (seu canal nativo),
      a fidelidade sobe proporcionalmente. Não tem livro, então Reels/podcasts
      são sua fonte Tier 1.

  priority_5_structural:
    title: "Padronizar mind_dna_complete para todos"
    effort: "baixo"
    impact: "Consistência do squad"
    why: |
      Pedro Sobral não tem mind_dna_complete.yaml (só voice + thinking separados).
      Marcos Hiller e Juliana Gomes têm mind_dna_complete mas superficiais (resumos).
      Padronizar formato completo como o do Ícaro para todos.

