# ═══════════════════════════════════════════════════════════════════════════════
# ENFORCEMENT POLICY
# ═══════════════════════════════════════════════════════════════════════════════

enforcement:
  checkpoint_policy: block_on_veto
  veto_behavior: halt_pipeline
  description: |
    Veto conditions em tasks, workflows e checklists são BLOQUEADORES MECÂNICOS.
    Quando um veto é acionado, a execução PARA até que o veto seja resolvido.
    O executor NÃO pode prosseguir ignorando um veto — deve resolver ou escalar.
  rules:
    - "Veto condition acionada → pipeline HALT"
    - "Human review required → aguardar aprovação explícita do usuário"
    - "Score < threshold (FAIL) → bloquear entrega, exigir revisão"
    - "WARN sem resolução → escalar para BLOCK após 2 ocorrências no mesmo workflow"

