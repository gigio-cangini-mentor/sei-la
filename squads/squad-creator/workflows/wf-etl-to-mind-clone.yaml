# WF-ETL-MIND: ETL → Mind Clone Pipeline
# Duration: 4-8 hours (depending on volume)
# Best for: Creating mind clones from large local content libraries
# Key Agents: @etl-chief, @oalanicolas, @squad-chief

workflow:
  id: wf-etl-to-mind-clone
  name: "ETL → Mind Clone Pipeline"
  version: "1.0.0"
  duration: "4-8 hours"
  description: |
    Pipeline completo que transforma uma biblioteca local de conteúdo bruto
    (PDFs, DOCX, áudios, vídeos) em um mind clone funcional.

    Fase 1: ETL converte tudo para Markdown padronizado
    Fase 2: Curadoria classifica e prioriza os melhores materiais
    Fase 3: @oalanicolas extrai Voice DNA + Thinking DNA
    Fase 4: Validação e quality gate do mind clone

    Este workflow produz:
    - Biblioteca completa em Markdown com frontmatter
    - Inventário de fontes classificado por Tier
    - Voice DNA completo (como o expert comunica)
    - Thinking DNA completo (como o expert decide)
    - mind_dna_complete.yaml pronto para criação de agent

  best_for:
    - "Expert com grande volume de conteúdo local (cursos, livros, transcrições)"
    - "Materiais já baixados em formatos variados (PDF, DOCX, áudio, vídeo)"
    - "Quando o conteúdo primário é mais valioso que fontes web"
    - "Mind clones de alta fidelidade (85-95%) com fontes Tier 1"

  not_for:
    - "Experts sem materiais locais (use *auto-acquire-sources primeiro)"
    - "Conversão de um único arquivo (use @etl-chief *convert)"
    - "Clones rápidos sem curadoria (use *clone-mind --mode yolo)"

# ═══════════════════════════════════════════════════════════════════════════════
# INPUTS (o que o usuário precisa fornecer)
# ═══════════════════════════════════════════════════════════════════════════════

inputs:
  required:
    - name: mind_name
      description: "Nome completo do expert"
      example: "Ícaro de Carvalho"

    - name: source_path
      description: "Caminho absoluto para a pasta com os materiais"
      example: "/Users/luizfosc/Dropbox/.../ICARO DE CARVALHO/"

    - name: domain
      description: "Domínio principal do expert"
      example: "marketing digital, copywriting, empreendedorismo digital"

  optional:
    - name: output_path
      description: "Onde salvar os outputs do mind clone (default: squads/mind-cloning/minds/{slug}/)"
      default: "squads/mind-cloning/minds/{slug}/"

    - name: etl_mode
      description: "Modo de conversão ETL"
      values: ["batch", "batch --recursive"]
      default: "batch --recursive"

    - name: clone_focus
      description: "Foco da extração de DNA"
      values: ["both", "voice", "thinking"]
      default: "both"

    - name: max_sources_for_dna
      description: "Máximo de fontes para usar na extração de DNA (as melhores)"
      default: 30

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 0: DISCOVERY — Mapear o terreno
# ═══════════════════════════════════════════════════════════════════════════════

phases:
  - id: PHASE-0
    name: "Discovery — Mapear o Terreno"
    tier: 0
    duration: "15-30 min"
    agent: "@squad-chief"
    description: |
      Antes de converter qualquer coisa, mapeamos o que temos.
      É como um arqueólogo fazendo o levantamento do sítio antes de escavar.

      1. Escanear a pasta recursivamente
      2. Classificar arquivos por tipo e formato
      3. Identificar o que já é .md (pronto) vs o que precisa conversão
      4. Estimar volume de trabalho
      5. Verificar se já existe mind clone parcial

    tasks:
      - name: "scan-source-directory"
        action: |
          Executar scan da pasta source_path:

          ```bash
          # Contar arquivos por extensão
          find "{source_path}" -type f ! -name '.DS_Store' | sed 's/.*\.//' | sort | uniq -c | sort -rn

          # Listar subpastas para entender estrutura
          find "{source_path}" -type d | head -20

          # Contar total
          find "{source_path}" -type f ! -name '.DS_Store' | wc -l
          ```

      - name: "check-existing-mind"
        action: |
          Verificar se já existe mind clone:
          - squads/mind-cloning/minds/{slug}/
          - Se existir, é brownfield (update, não create)

      - name: "generate-conversion-plan"
        action: |
          Produzir relatório:
          - Total de arquivos por tipo
          - Quantos já são .md (prontos)
          - Quantos precisam conversão ETL
          - Estimativa de tempo
          - Subpastas e organização do conteúdo

    checkpoint:
      name: "QG-DISC: Discovery Gate"
      human_review: true
      criteria:
        - "Scan completo da pasta de origem"
        - "Classificação de arquivos por tipo"
        - "Plano de conversão com estimativa"
        - "Verificação de mind clone existente"
      veto_conditions:
        - "Pasta de origem não existe ou está vazia → ABORT"
        - "Menos de 5 arquivos de conteúdo → WARN (pode não ser suficiente)"
        - "Mind clone já existe e está completo → Sugerir *update-mind"
      output: "discovery-report.md"
      ask_user: |
        Mapeei o terreno. Aqui está o que encontrei:
        [discovery-report]

        Posso prosseguir com a conversão ETL?

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: ETL CONVERSION — Converter tudo para Markdown
# ═══════════════════════════════════════════════════════════════════════════════

  - id: PHASE-1
    name: "ETL Conversion — Transformar em Markdown"
    tier: 1
    duration: "1-3 hours"
    agent: "@etl-chief"
    description: |
      O ETL Universal Converter entra em ação. É como uma linha de montagem:
      cada tipo de arquivo passa pelo processador certo e sai como .md padronizado.

      PDFs → book-to-markdown → .md com frontmatter
      DOCX → book-to-markdown → .md com frontmatter
      Áudios → media-processor (transcrição) → .md
      Já .md → normalização de frontmatter

      IMPORTANTE: Os .md que já existem NÃO são reconvertidos.
      Apenas recebem frontmatter padronizado se não tiverem.

    tasks:
      - name: "etl-batch-convert"
        squad: "etl-universal-converter"
        command: "*batch {source_path} --recursive"
        action: |
          Ativar @etl-chief com:
          *batch "{source_path}" --recursive

          Configurações:
          - skip_existing: true (não reconverter .md existentes)
          - output_location: same_directory
          - language: pt-BR
          - quality_threshold: 7.0

          Para arquivos já .md:
          - Verificar se têm frontmatter
          - Se não, adicionar frontmatter padrão
          - NÃO alterar conteúdo

      - name: "etl-normalize-existing-md"
        action: |
          Para os .md que já existiam:
          1. Verificar se têm frontmatter YAML
          2. Se não, adicionar frontmatter mínimo:
             ---
             title: "{extraído do filename ou H1}"
             source_type: document
             source_format: md
             source_path: "{path original}"
             date_processed: "{today}"
             language: "pt-BR"
             ---
          3. NÃO alterar conteúdo do documento

      - name: "etl-quality-check"
        squad: "etl-universal-converter"
        command: "*qa-batch {source_path}"
        action: |
          Verificar qualidade das conversões:
          *qa-batch "{source_path}" --recursive

          Threshold: 7.0/10
          Se < 7.0: retry automático (até 2x)
          Se < 5.0: flag para revisão humana

    checkpoint:
      name: "QG-ETL: Conversion Quality Gate"
      human_review: true
      criteria:
        - "Todos os PDFs convertidos para .md"
        - "Todos os DOCX convertidos para .md"
        - "Quality score médio >= 7.0"
        - "Frontmatter presente em TODOS os .md"
        - "Zero perda de conteúdo (comparar contagem)"
      veto_conditions:
        - "Quality score médio < 5.0 → BLOCK (revisar conversões)"
        - "Mais de 20% dos arquivos falharam → BLOCK"
        - "Arquivos convertidos < 50% do total → BLOCK"
      output: "etl-conversion-report.md"
      ask_user: |
        Conversão ETL completa:
        - {N} arquivos convertidos com sucesso
        - Quality score médio: {score}/10
        - {N} flags para revisão

        Posso prosseguir para a curadoria?

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: CURATION — Classificar e priorizar
# ═══════════════════════════════════════════════════════════════════════════════

  - id: PHASE-2
    name: "Curadoria — Classificar e Priorizar"
    tier: 1
    duration: "30-60 min"
    agent: "@oalanicolas"
    description: |
      Agora que tudo é .md, precisamos separar o ouro do bronze.
      É como um garimpeiro: não é todo cascalho que tem pepita.

      @oalanicolas aplica o framework "Ouro vs Bronze":
      - OURO (Tier 1): Conteúdo direto do expert, em primeira pessoa, com frameworks
      - PRATA (Tier 2): Resumos, estudos de caso, entrevistas
      - BRONZE (Tier 3): Menções indiretas, compilações de terceiros

      Só o OURO e PRATA alimentam a extração de DNA.

    tasks:
      - name: "classify-sources"
        task_ref: "collect-sources.md"
        action: |
          @oalanicolas classifica cada fonte:

          1. Ler amostra de cada .md (primeiros 500 chars + frontmatter)
          2. Classificar por Tier:
             - Tier 1 (OURO): Aulas diretas, cursos, livros do expert
             - Tier 2 (PRATA): Entrevistas, podcasts onde participa
             - Tier 3 (BRONZE): Resumos de terceiros, compilações
          3. Classificar por TEMA:
             - copywriting, marketing, empreendedorismo, storytelling,
               lançamento, branding, vendas, mindset, etc.
          4. Priorizar: as fontes mais ricas em frameworks primeiro

      - name: "generate-source-inventory"
        action: |
          Produzir sources_inventory.yaml:

          ```yaml
          mind: "{mind_name}"
          domain: "{domain}"
          total_sources: {N}
          tier_breakdown:
            tier_1: {N}  # Ouro
            tier_2: {N}  # Prata
            tier_3: {N}  # Bronze
          theme_breakdown:
            copywriting: {N}
            marketing: {N}
            # ...
          top_sources:  # As {max_sources_for_dna} melhores para DNA
            - path: "..."
              tier: 1
              theme: "copywriting"
              richness_score: 9  # 1-10: quanto framework tem
              word_count: {N}
          decision: "GO"  # GO / CONDITIONAL / NO-GO
          ```

      - name: "select-dna-sources"
        action: |
          Selecionar as {max_sources_for_dna} melhores fontes para extração:
          - Priorizar Tier 1
          - Diversificar temas (não só copywriting)
          - Priorizar as mais ricas em frameworks
          - Garantir cobertura dos principais temas do expert

    checkpoint:
      name: "QG-CUR: Curation Quality Gate"
      human_review: true
      criteria:
        - "Todas as fontes classificadas por Tier"
        - "Fontes Tier 1 >= 5"
        - "Temas mapeados e diversificados"
        - "Top sources selecionadas para DNA"
        - "sources_inventory.yaml gerado"
      veto_conditions:
        - "Fontes Tier 1 < 3 → NO-GO (material insuficiente)"
        - "Todos os temas iguais → WARN (falta diversidade)"
        - "Nenhum framework identificado nas fontes → NO-GO"
      output: "sources_inventory.yaml"
      ask_user: |
        Curadoria completa:
        - {N} fontes Tier 1 (OURO)
        - {N} fontes Tier 2 (PRATA)
        - {N} temas mapeados
        - Top {max_sources_for_dna} fontes selecionadas para DNA

        Decisão: {GO/CONDITIONAL/NO-GO}

        Posso iniciar a extração de DNA?

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: DNA EXTRACTION — Extrair Voice + Thinking DNA
# ═══════════════════════════════════════════════════════════════════════════════

  - id: PHASE-3
    name: "DNA Extraction — Voice + Thinking DNA"
    tier: 2
    duration: "2-4 hours"
    agent: "@oalanicolas"
    description: |
      O coração do workflow. @oalanicolas lê as melhores fontes e extrai
      o DNA completo do expert — como se fizesse uma biópsia do pensamento.

      Voice DNA = COMO o expert comunica
      Thinking DNA = COMO o expert decide

      Cada claim é rastreável a [SOURCE:] — nada inventado.

    tasks:
      - name: "extract-voice-dna"
        task_ref: "extract-voice-dna.md"
        action: |
          @oalanicolas executa extração de Voice DNA:

          Input: Top sources selecionadas na Phase 2
          Output: voice_dna YAML block com:
          - 10-15 power words com peso emocional
          - 5-10 signature phrases rastreáveis
          - 3-5 metáforas recorrentes
          - Estruturas de história e anedotas
          - Estilo de escrita (parágrafos, frases, recursos retóricos)
          - Dimensões de tom (calor, diretividade, formalidade, etc.)
          - Anti-patterns (o que NUNCA diz/faz)
          - Immune system (rejeições automáticas)
          - Contradições de voz (paradoxos a preservar)

          REGRA: Toda claim com [SOURCE: filename, page/timestamp]

      - name: "extract-thinking-dna"
        task_ref: "extract-thinking-dna.md"
        action: |
          @oalanicolas executa extração de Thinking DNA:

          Input: Top sources selecionadas na Phase 2
          Output: thinking_dna YAML block com:
          - Framework primário (o "OS" do expert)
          - 2-4 frameworks secundários
          - Framework de diagnóstico
          - 5-10 heurísticas de decisão (IF/THEN)
          - Heurísticas de veto (deal-breakers)
          - Arquitetura de decisão (pipeline, pesos, perfil de risco)
          - Anti-patterns de pensamento
          - Recognition patterns (radares mentais)
          - Objection handling
          - Handoff triggers

          REGRA: Toda claim com [SOURCE: filename, page/timestamp]

      - name: "merge-dna"
        action: |
          Combinar Voice DNA + Thinking DNA em:
          outputs/minds/{slug}/mind_dna_complete.yaml

          Estrutura:
          ```yaml
          mind:
            name: "{mind_name}"
            slug: "{slug}"
            domain: "{domain}"
            extraction_date: "{today}"
            sources_used: {N}
            fidelity_estimate: "{60-95}%"

          voice_dna:
            # ... (da extração)

          thinking_dna:
            # ... (da extração)

          metadata:
            total_sources: {N}
            tier_1_sources: {N}
            themes_covered: [...]
            extraction_duration: "..."
          ```

    checkpoint:
      name: "QG-DNA: DNA Quality Gate"
      human_review: true
      criteria:
        - "Voice DNA com 15+ citations [SOURCE:]"
        - "5+ signature phrases verificáveis"
        - "Thinking DNA com framework primário identificado"
        - "Heurísticas têm QUANDO usar"
        - "Zero inferências não marcadas"
        - "mind_dna_complete.yaml gerado"
      veto_conditions:
        - "Citations < 10 → BLOCK (extração superficial)"
        - "Nenhum framework identificado → BLOCK (reextrair)"
        - "Voice DNA sem signature phrases → BLOCK"
        - "Fidelity estimate < 60% → WARN (considerar mais fontes)"
      output: "mind_dna_complete.yaml"
      ask_user: |
        Extração de DNA completa:
        - Voice DNA: {N} signature phrases, {N} power words
        - Thinking DNA: {N} frameworks, {N} heurísticas
        - Fidelidade estimada: {fidelity}%
        - Total de citações rastreáveis: {N}

        Quer revisar o DNA antes de finalizar?

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 4: VALIDATION — Quality Gate Final
# ═══════════════════════════════════════════════════════════════════════════════

  - id: PHASE-4
    name: "Validation — Quality Gate Final"
    tier: 2
    duration: "30-60 min"
    agent: "@squad-chief"
    description: |
      Última fase: validar que o mind clone está pronto para uso.
      É como a inspeção final antes de entregar o carro da fábrica.

    tasks:
      - name: "validate-mind-clone"
        action: |
          Aplicar checklist mind-validation.md:

          1. Voice DNA completo? (8 seções obrigatórias)
          2. Thinking DNA completo? (6 seções obrigatórias)
          3. Signature phrases rastreáveis a [SOURCE:]?
          4. Frameworks com QUANDO usar?
          5. Anti-patterns específicos (não genéricos)?
          6. Fidelidade >= 60%?

      - name: "smoke-test-mind"
        action: |
          3 smoke tests comportamentais:

          Test 1 — Conhecimento do domínio:
          "Como você abordaria o lançamento de um produto digital de R$ 497?"
          → Resposta deve usar frameworks e vocabulário do expert

          Test 2 — Tomada de decisão:
          "Um aluno pergunta se deve investir em tráfego pago ou orgânico primeiro."
          → Resposta deve refletir heurísticas documentadas

          Test 3 — Objeção:
          "Marketing digital é saturado, não tem mais espaço."
          → Resposta deve usar objection handling patterns do expert

      - name: "generate-summary"
        action: |
          Gerar resumo final:

          ```markdown
          # Mind Clone: {mind_name}

          ## Status: {PASS/FAIL}
          ## Fidelidade: {N}%

          ### Materiais Processados
          - Total de arquivos: {N}
          - Convertidos pelo ETL: {N}
          - Usados na extração: {N}

          ### DNA Extraído
          - Voice DNA: {status}
          - Thinking DNA: {status}
          - Signature phrases: {N}
          - Frameworks: {N}
          - Heurísticas: {N}

          ### Próximos Passos
          - [ ] Criar agent baseado no DNA (*create-agent)
          - [ ] Criar squad com este mind + complementares (*create-squad)
          - [ ] Refinar com mais fontes (*update-mind)
          ```

    checkpoint:
      name: "QG-FINAL: Mind Clone Ready"
      human_review: true
      criteria:
        - "mind-validation.md checklist PASS"
        - "3/3 smoke tests PASS"
        - "mind_dna_complete.yaml válido"
        - "Summary report gerado"
      veto_conditions:
        - "Qualquer smoke test FAIL → BLOCK (revisar DNA)"
        - "Checklist com item FAIL → BLOCK (corrigir)"
      output: "mind-clone-summary.md"
      ask_user: |
        Mind clone do {mind_name} está pronto!

        Score: {score}/10
        Fidelidade: {fidelity}%

        Quer que eu crie um agent baseado neste DNA? (*create-agent)

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLETION SIGNALS
# ═══════════════════════════════════════════════════════════════════════════════

completion_signals:
  success:
    - "mind_dna_complete.yaml existe e é válido"
    - "Todos os quality gates PASS"
    - "3/3 smoke tests PASS"
    - "Summary report gerado"
  partial:
    - "ETL completo mas DNA parcial → salvar progresso, retomar depois"
    - "Voice DNA ok mas Thinking DNA fraco → sugerir mais fontes"
  failure:
    - "ETL falhou em > 50% dos arquivos"
    - "Nenhum framework identificado nas fontes"
    - "Fontes Tier 1 insuficientes (< 3)"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUTS
# ═══════════════════════════════════════════════════════════════════════════════

outputs:
  primary:
    - name: "mind_dna_complete.yaml"
      path: "outputs/minds/{slug}/mind_dna_complete.yaml"
      description: "DNA completo (Voice + Thinking) pronto para criação de agent"

  secondary:
    - name: "sources_inventory.yaml"
      path: "outputs/minds/{slug}/sources_inventory.yaml"
      description: "Inventário classificado de todas as fontes"

    - name: "etl-conversion-report.md"
      path: "outputs/minds/{slug}/etl-conversion-report.md"
      description: "Relatório de conversão ETL"

    - name: "mind-clone-summary.md"
      path: "outputs/minds/{slug}/mind-clone-summary.md"
      description: "Resumo final com score e próximos passos"

  converted_content:
    - name: "Markdown files"
      path: "{source_path}/**/*.md"
      description: "Todos os arquivos convertidos para .md (in-place)"

# ═══════════════════════════════════════════════════════════════════════════════
# AGENTS BY PHASE
# ═══════════════════════════════════════════════════════════════════════════════

agents_by_phase:
  PHASE-0: "@squad-chief"
  PHASE-1: "@etl-chief"
  PHASE-2: "@oalanicolas"
  PHASE-3: "@oalanicolas"
  PHASE-4: "@squad-chief"

