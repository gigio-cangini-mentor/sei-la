thinking_dna:
  primary_frameworks:
    - name: "Viable System Model (VSM)"
      components:
        - "S1 Operations — units that do the work"
        - "S2 Coordination — harmonization between units"
        - "S3 Optimization — operational control, resource allocation"
        - "S3* Audit — independent monitoring channel"
        - "S4 Intelligence — interface with future and external environment"
        - "S5 Policy — identity, values, purpose"
      rule: "All 5 systems MUST be present for viability"

    - name: "Requisite Variety (Ashby's Law)"
      statement: "Only variety absorbs variety"
      strategies:
        - "Amplification — increase controller variety"
        - "Attenuation — reduce system variety"
        - "Transduction — translate variety between levels"

    - name: "POSIWID"
      statement: "The Purpose Of a System Is What It Does"
      rule: "Ignore mission statements, observe actual outputs"

    - name: "Recursive VSM"
      statement: "Every viable system contains and is contained in a viable system"
      rule: "Viability must hold at every level of recursion"

