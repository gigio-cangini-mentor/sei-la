# ===============================================================================
# QUALITY CHECKLIST
# ===============================================================================

quality_checklist:
  intake_triage:
    - "[ ] 8 perguntas de triagem respondidas"
    - "[ ] Escopo definido e delimitado"
    - "[ ] Cliente do diagnostico identificado"
    - "[ ] Profundidade selecionada (rapido/padrao/profundo)"
    - "[ ] Routing decisions documentadas"

  domain_classification:
    - "[ ] Cynefin domain classificado"
    - "[ ] Justificativa com pelo menos 3 indicadores"
    - "[ ] Implicacoes metodologicas documentadas"
    - "[ ] Decision Point 1 input preparado"

  viability_assessment:
    - "[ ] 5 sistemas VSM mapeados (S1-S5)"
    - "[ ] Viabilidade de cada sistema avaliada"
    - "[ ] Equilibrio de variedade verificado (Lei de Ashby)"
    - "[ ] Recursion check executado"

  cultural_diagnosis:
    - "[ ] 3 niveis de cultura analisados"
    - "[ ] Dinamicas ocultas surfaceadas ou confirmadas ausentes"
    - "[ ] Mapa politico documentado"

  assumption_audit:
    - "[ ] Todos pressupostos identificados e listados"
    - "[ ] Cada pressuposto classificado (verificado/nao verificado/infundado)"
    - "[ ] Ladder of Inference percorrida integralmente"
    - "[ ] Governing variables identificadas"
    - "[ ] Defensive routines sinalizadas"

  system_dynamics:
    - "[ ] Iceberg Model 4 niveis documentados"
    - "[ ] Pelo menos 1 feedback loop identificado (R ou B)"
    - "[ ] Pelo menos 1 archetype testado"
    - "[ ] Leverage points classificados (Meadows)"
    - "[ ] Sintese com key insight"

  problem_reframing:
    - "[ ] Pelo menos 3 estrategias de reframing aplicadas"
    - "[ ] Contraste original vs reframeado documentado"
    - "[ ] Reframing justificado com evidencias"
    - "[ ] Bright spots investigados"

  deep_diagnosis:
    - "[ ] Metodo correto para o dominio (CRT ou SSM)"
    - "[ ] Se CRT: UDEs conectados a causas via cadeia de suficiencia"
    - "[ ] Se SSM: Rich Picture + CATWOE completo"
    - "[ ] Modelo validado contra dados do intake"

  root_cause_analysis:
    - "[ ] Pelo menos 1 causa-raiz identificada"
    - "[ ] Cada causa tem evidencia verificavel"
    - "[ ] Sintomas separados de causas"
    - "[ ] Impacto estimado por causa (%)"
    - "[ ] Teste de falsificacao aplicado"

  evidence_quantification:
    - "[ ] Niveis de confianca quantificados"
    - "[ ] Measurement chains documentadas"
    - "[ ] VoI calculado para maiores incognitas"

  stress_test:
    - "[ ] Pelo menos 3 cenarios de falha articulados"
    - "[ ] Data/Frame check executado"
    - "[ ] Vies de confirmacao verificado"
    - "[ ] Confianca revisada declarada"

  action_package:
    - "[ ] HMW statements para cada causa-raiz"
    - "[ ] Criterios de sucesso definidos"
    - "[ ] Acoes priorizadas por impacto x esforco"
    - "[ ] Quick wins identificados"

  diagnostic_report:
    - "[ ] Sumario executivo em 1 pagina"
    - "[ ] Evolucao do problem statement documentada"
    - "[ ] Sintomas vs causas-raiz explicitamente separados"
    - "[ ] Causas-raiz com evidencia verificavel"
    - "[ ] Confianca do diagnostico declarada (%)"
    - "[ ] Proximos passos especificos e acionaveis"
    - "[ ] Formato adequado ao cliente"

