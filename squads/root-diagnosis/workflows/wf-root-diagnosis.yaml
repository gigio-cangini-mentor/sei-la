# ===============================================================================
# HANDOFF PROTOCOL
# ===============================================================================

handoff_protocol:
  format: |
    === HANDOFF: {source_agent} -> {target_agent} ===
    Diagnostic ID: {diagnostic_id}
    Phase: {current_phase} -> {next_phase}
    Mode: {full | quick}
    Depth: {rapido | padrao | profundo}

    --- PROBLEMA DECLARADO (Phase 0) ---
    {problema_original}

    --- PROBLEMA REFRAMEADO (Phase 4) [se disponivel] ---
    {problema_reframeado}

    --- CYNEFIN DOMAIN (Phase 1) ---
    {cynefin_domain}: {justificativa}

    --- OUTPUTS ANTERIORES ---
    {accumulated_outputs_summary}

    --- DECISION POINT (se aplicavel) ---
    {decision_rationale}

    --- MISSAO PARA {target_agent} ---
    {o_que_o_especialista_precisa_fazer}

    --- OUTPUT ESPERADO ---
    {formato_e_conteudo_esperado}

    --- DADOS DISPONIVEIS ---
    {dados_metricas_acessos}
    ===

  rules:
    - "NUNCA passar so a pergunta — sempre contexto acumulado completo"
    - "SEMPRE incluir problema ORIGINAL e REFRAMEADO (apos Phase 4)"
    - "SEMPRE incluir classificacao Cynefin (apos Phase 1)"
    - "NUNCA rotear sem justificativa documentada"
    - "Se agente precisa mais dados -> retornar para Chief"
    - "Contexto NUNCA resumido sem autorizacao — outputs completos"
    - "Divergencias entre agentes mediadas e documentadas pelo Chief"

# ===============================================================================
# CONFIDENCE CALCULATION
# ===============================================================================

confidence_calculation:
  method: |
    Confianca = media ponderada de:
    - Numero de fases concluidas vs total (peso 30%)
    - Numero de fontes de dados acessadas (peso 25%)
    - Convergencia entre agentes (peso 25%)
    - Validacao via stress test (peso 20%)

  levels:
    - range: "90-100%"
      label: "Alta confianca"
      description: "Multiplas evidencias convergentes, stress test validado, quantificacao completa"
    - range: "70-89%"
      label: "Confianca moderada"
      description: "Evidencias suficientes, algumas lacunas, stress test executado"
    - range: "50-69%"
      label: "Confianca limitada"
      description: "Poucas evidencias, diagnostico e hipotese forte, stress test nao executado"
    - range: "0-49%"
      label: "Baixa confianca"
      description: "Diagnostico preliminar, requer investigacao adicional"

# ===============================================================================
# COMPLETION SIGNALS
# ===============================================================================

completion_signals:
  phase_complete: "<signal>PHASE-{N}:COMPLETE</signal>"
  checkpoint_pass: "<signal>QG-RD-{name}:PASS</signal>"
  checkpoint_fail: "<signal>QG-RD-{name}:FAIL:{reason}</signal>"
  decision_point: "<signal>DP{N}:ROUTE:{agent}</signal>"
  workflow_complete: "<signal>WF-ROOT-DIAGNOSIS:COMPLETE</signal>"
  workflow_blocked: "<signal>WF-ROOT-DIAGNOSIS:BLOCKED:{phase}:{reason}</signal>"

