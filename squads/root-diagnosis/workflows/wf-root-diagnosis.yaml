    system dynamics (Iceberg/CLDs/Archetypes/Leverage Points), reframing (5 estrategias),
    diagnostico profundo adaptativo (CRT/SSM), RCA adaptativa (KT/Apollo),
    quantificacao de evidencias (AIE), stress test cognitivo (PreMortem),
